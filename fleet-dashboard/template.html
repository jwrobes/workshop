<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fleet Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#f7f4ee;color:#23211c;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  @keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulseAmber{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes cardIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  ::-webkit-scrollbar{height:9px;width:9px}
  ::-webkit-scrollbar-thumb{background:#d8d0c2;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  a{color:inherit}
  .mono{font-family:'IBM Plex Mono',monospace}
  .serif{font-family:'Spectral',serif}
  .wrap{width:100%;max-width:1080px;margin:0 auto;padding:0 20px 80px}
  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:26px 0 22px;border-bottom:1px solid #e6e0d5;flex-wrap:wrap}
  .crumbs{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .crumb{all:unset;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;white-space:nowrap}
  .crumb.root{letter-spacing:.18em;text-transform:uppercase;color:#9a9384}
  .sep{color:#cabfa9;font-size:12px}
  .stamp{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a8a191;letter-spacing:.04em}
  section{animation:viewIn .3s ease}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#b08d4e;margin-bottom:12px}
  h1.title{font-family:'Spectral',serif;font-weight:400;font-size:clamp(30px,5vw,46px);line-height:1.05;margin:0;letter-spacing:-.01em}
  .lede{font-size:15px;color:#736c5e;margin:14px 0 0;max-width:52ch;line-height:1.5}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px;margin-top:30px}
  .pcard{all:unset;cursor:pointer;position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:172px;background:#fffdf9;border:1px solid #e9e3d7;border-radius:6px;padding:20px;box-shadow:0 1px 2px rgba(60,50,30,.03);transition:transform .15s,box-shadow .15s,border-color .15s}
  .pcard:hover{border-color:#d8cfbd;box-shadow:0 6px 20px rgba(60,50,30,.07);transform:translateY(-2px)}
  .edge{position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:0 3px 3px 0}
  .pname{font-family:'Spectral',serif;font-size:23px;font-weight:500;line-height:1.12;letter-spacing:-.01em}
  .prepo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a39c8c;margin-top:7px}
  .pbig{font-family:'Spectral',serif;font-size:30px;font-weight:500;line-height:1}
  .pfoot{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:18px}
  .clear{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#5d8a6f;font-family:'IBM Plex Mono',monospace}
  .clear .ring{width:15px;height:15px;border-radius:50%;border:1.5px solid #7faa8c;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
  .attn{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#a9762a}
  .attn .dot{width:8px;height:8px;border-radius:50%;background:#cf962f;box-shadow:0 0 0 4px rgba(207,150,47,.15)}
  .ubucket{all:unset;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;min-height:172px;background:transparent;border:1px dashed #d3cab8;border-radius:6px;padding:20px;transition:background .15s,border-color .15s}
  .ubucket:hover{background:#faf6ee;border-color:#c2b89f}
  /* pipeline map */
  .pmwrap{margin-top:26px;animation:viewIn .3s ease}
  .pmhead{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .pmbox{background:#fffdf9;border:1px solid #ece5d8;border-radius:8px;padding:20px 22px 22px}
  .pmtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .pmtoggle{all:unset;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#9a7b3f;border:1px solid #e3d6bd;background:#fbf4e5;padding:5px 11px;border-radius:20px}
  .pmtoggle:hover{color:#7d6230;border-color:#d9c8a6;background:#f6ecd6}
  .pmrail{position:relative}
  .pmline{position:absolute;left:9%;right:9%;top:18px;height:3px;border-radius:3px;background:linear-gradient(90deg,#cdc4b2,#cdb079,#cf962f,#c07f33,#7faa8c)}
  .pmstops{position:relative;display:flex}
  .pmstop{all:unset;cursor:pointer;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding-bottom:6px;border-radius:8px;transition:background .15s}
  .pmstop:hover{background:#f6f1e8}
  .pmdetail{display:flex;margin-top:4px}
  .pmcol{flex:1;display:flex;flex-direction:column;gap:7px;padding:0 5px}
  .pmchip{all:unset;cursor:pointer;display:block;animation:cardIn .2s ease;background:#fffdf9;border:1px solid #ece5d8;border-radius:6px;padding:7px 9px;box-shadow:0 1px 2px rgba(60,50,30,.03);margin-bottom:7px;width:100%;box-sizing:border-box}
  .pmchip:hover{background:#fff;border-color:#d9cfbd;box-shadow:0 4px 12px rgba(60,50,30,.06)}
  .river{background:#fffdf9;border:1px solid #ece5d8;border-radius:8px;padding:18px 16px}
  .na{margin-top:26px;border:1px solid #e7d3a6;background:linear-gradient(#fffdf6,#fdf7e9);border-radius:8px;overflow:hidden}
  .na-h{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #efe0bd}
  .na-item{all:unset;cursor:pointer;display:flex;align-items:center;gap:14px;width:100%;box-sizing:border-box;padding:13px 18px;border-bottom:1px solid #f1e6c9}
  .na-item:hover{background:#fdf6e4}
  .tag{flex:none;width:78px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:4px 7px;border-radius:4px;text-align:center}
  .repogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px}
  .rcard{all:unset;cursor:pointer;position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:128px;background:#fffdf9;border:1px solid #e9e3d7;border-radius:6px;padding:16px 16px 14px;box-shadow:0 1px 2px rgba(60,50,30,.03);transition:transform .15s,box-shadow .15s,border-color .15s}
  .rcard:hover{border-color:#d8cfbd;box-shadow:0 6px 18px rgba(60,50,30,.07);transform:translateY(-2px)}
  .board{margin-top:34px;display:grid;gap:16px;align-items:start}
  .col-h{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
  .col-h .lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .col-h .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b3ab9b}
  .kcard{all:unset;cursor:pointer;position:relative;display:block;background:#fffdf9;border:1px solid #e7e0d2;border-radius:6px;padding:13px 14px;box-shadow:0 1px 2px rgba(60,50,30,.03);transition:box-shadow .12s,border-color .12s}
  .kcard:hover{border-color:#d4cab8;box-shadow:0 5px 16px rgba(60,50,30,.07)}
  .kcard .t{display:block;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#33302a;line-height:1.35;overflow-wrap:anywhere}
  .kmeta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px}
  .prpill{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10.5px}
  .prpill .d{width:6px;height:6px;border-radius:50%}
  .bcard{all:unset;cursor:pointer;display:block;background:#faf6ee;border:1px dashed #ddd4c2;border-radius:6px;padding:12px 13px}
  .bcard:hover{background:#fffdf9;border-color:#c7bca6}
  .ccard{all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:6px;border:1px solid #ece5d8;background:#fbf8f2}
  .ccard:hover{border-color:#dcd3c2;background:#fff}
  .colstack{display:flex;flex-direction:column;gap:10px}
  .planhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .statuspill{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:5px}
  .pathtag{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px}
  .l3grid{display:grid;gap:22px;margin-top:26px;align-items:start}
  .links{border:1px solid #e9e3d7;border-radius:8px;overflow:hidden;background:#fffdf9}
  .lrow{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit;padding:13px 16px;border-bottom:1px solid #f1ece1}
  .lrow:last-child{border-bottom:none}
  .lk{flex:none;width:64px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:#9a917f}
  .lv{flex:1;min-width:0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#3b372f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .localonly{margin-top:14px;border:1px dashed #ddd4c2;border-radius:8px;padding:14px 16px;background:#faf6ee}
  .handoff{border:1px solid #e1d8c6;border-radius:8px;background:linear-gradient(#2c2a24,#262420);color:#efe9dd;overflow:hidden}
  .handoff pre{margin:14px 0 0;padding:14px 17px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.55;color:#d8d1c2;white-space:pre-wrap;word-break:break-word;border-top:1px solid #3a3730;background:#211f1b;max-height:260px;overflow:auto}
  .copybtn{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-sizing:border-box;background:#d7a23f;color:#241f12;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.04em;padding:11px;border-radius:6px;font-weight:500}
  .copybtn:hover{background:#e2b256}
  .artifacts{margin-top:18px;border:1px solid #e9e3d7;border-radius:8px;background:#fffdf9;padding:16px 18px 18px}
  .artcard{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;border:1px solid #ece5d8;border-radius:6px;padding:12px 13px;background:#fbf8f2}
  .artcard:hover{border-color:#d9cfbd;background:#fff}
  .artslot{border:1px dashed #ddd4c2;border-radius:6px;padding:14px 15px;background:#faf6ee;color:#8c8576;font-size:12.5px;line-height:1.5}
  .yah{margin-top:24px;border:1px solid #ece5d8;background:#fffdf9;border-radius:8px;padding:22px 24px 20px}
  .backbtn{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8c8576}
  .backbtn:hover{color:#3b372f}
  .empty{color:#8c8576;padding:60px 0;text-align:center}
  .muted{color:#a39c8c}
  .md{font-size:14.5px;line-height:1.65;color:#3a352d;max-width:70ch}
  .md .md-h{font-family:'Spectral',serif;font-weight:600;line-height:1.25;margin:22px 0 8px;color:#2a2722}
  .md h1.md-h{font-size:24px} .md h2.md-h{font-size:19px} .md h3.md-h{font-size:16px}
  .md h4.md-h,.md h5.md-h,.md h6.md-h{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#6e6757}
  .md .md-p{margin:9px 0}
  .md .md-ul{margin:9px 0;padding-left:22px} .md .md-ul li{margin:4px 0}
  .md code{font-family:'IBM Plex Mono',monospace;font-size:.88em;background:#f0ebe0;padding:.1em .35em;border-radius:4px}
  .md .md-pre{background:#262420;color:#e4ddcf;border-radius:6px;padding:13px 15px;overflow:auto;font-size:12.5px;line-height:1.5}
  .md .md-pre code{background:none;padding:0;color:inherit}
  .md a{color:#9a6f22;text-decoration:underline}
</style>

<body>
<div class="wrap">
  <header class="top">
    <div class="crumbs" id="crumbs"></div>
    <div class="stamp" id="stamp"></div>
  </header>
  <div id="app"></div>
</div>

<script>
const DATA = /*__DATA__*/null;

function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function attr(s){return esc(s).replace(/"/g,'&quot;');}
// tiny, safe markdown -> html (escapes first, then applies a minimal subset)
function mdToHtml(src){
  if(!src) return '';
  let s=src;
  if(s.replace(/^\s+/,'').startsWith('---')){const p=s.split('---');if(p.length>=3){s=p.slice(2).join('---');}}
  s=esc(s);
  const lines=s.split('\n');const out=[];let inCode=false,inList=false;
  const inline=t=>t
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  for(let raw of lines){
    if(raw.trim().startsWith('```')){ if(inList){out.push('</ul>');inList=false;} inCode=!inCode; out.push(inCode?'<pre class="md-pre"><code>':'</code></pre>'); continue; }
    if(inCode){ out.push(raw); continue; }
    const h=raw.match(/^(#{1,6})\s+(.*)$/);
    if(h){ if(inList){out.push('</ul>');inList=false;} const lvl=h[1].length; out.push('<h'+lvl+' class="md-h">'+inline(h[2])+'</h'+lvl+'>'); continue; }
    const li=raw.match(/^\s*[-*]\s+(.*)$/);
    if(li){ if(!inList){out.push('<ul class="md-ul">');inList=true;} out.push('<li>'+inline(li[1])+'</li>'); continue; }
    if(raw.trim()===''){ if(inList){out.push('</ul>');inList=false;} continue; }
    if(inList){out.push('</ul>');inList=false;}
    out.push('<p class="md-p">'+inline(raw)+'</p>');
  }
  if(inList)out.push('</ul>'); if(inCode)out.push('</code></pre>');
  return out.join('\n');
}
function $(id){return document.getElementById(id);}
function slug(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

const STATE={level:'fleet',productId:null,repoId:null,planId:null,doneOpen:false,mapExpanded:{},mapAll:false,trackOpen:{},trackName:null,strandOpen:{},archivedOpen:false};

function products(){return (DATA&&DATA.products)||[];}
function kanban(){return (DATA&&DATA.kanban)||[];}
function worktrees(){return (DATA&&DATA.worktrees)||[];}
function unaffiliated(){return (DATA&&DATA.unaffiliated)||[];}
// Board/pipeline/repo views show plan-bearing cards INCLUDING shipped merged
// work. `merged-unmatched` cards (shipped PRs whose branch matched no plan) have
// status 'shipped' — they belong in the SHIPPED pipeline stage + the (collapsed)
// Completed column, NOT in ACTIVE/BACKLOG, so they don't flood the board. They
// also appear in the Work-tracks view. (Earlier they were excluded entirely,
// which wrongly showed SHIPPED: 0 on a repo that had 28 merged PRs.)
function isMergedUnmatched(c){return c.source==='merged-unmatched';}
// Archive (Pass-1 triage): a soft, reversible flag (collector stamps c.archived
// from the overrides `archive` list). Archived cards are DROPPED from the board /
// pipeline / Ungrouped surfaces so they don't clutter — but they stay in
// DATA.kanban, so the Work-tracks "Archived" section can list them + unarchive.
function archivedCards(){return kanban().filter(c=>c.archived);}
function plansFor(pid){return kanban().filter(c=>c.product===pid&&!c.archived);}
// Work-tracks (Phase 5): consolidated groupings. Mirrors collector's _card_id.
function tracks(){return (DATA&&DATA.tracks)||[];}
function tracksMulti(){return tracks().filter(t=>(t.members||[]).length>=2);}
function trackByName(name){return tracks().find(t=>t.name===name)||null;}
// Which board column a unified track card lands in. Driven by the STRANDS'
// collective activity, not the furthest-along stage: a track is Completed only
// when EVERY strand is done; any active (in-flight) strand -> Active; else any
// backlog (queued, not-started) strand -> Backlog. So a track with 3 shipped PRs
// but an open spec + open issues is Active (live work), not Completed. The
// collector computes this as facts.placement (consolidate.strand_activity).
function trackColumn(t){
  const pl=(t.facts||{}).placement;
  if(pl==='active'||pl==='backlog'||pl==='completed') return pl;
  // Fallback for tracks stamped before placement existed.
  return ((t.facts||{}).furthest_stage==='shipped')?'completed':'active';
}
function cardId(c){
  // Mirrors collector _card_id. A product-level PR has repo=null -> use
  // product#number (e.g. magic-me#113), not the ambiguous ?#113.
  const n=(c.github||{}).number;
  const scope=c.repo||c.product||'?';
  if(n!=null) return scope+'#'+n;
  return scope+'/'+(c.slug||'');
}
function cardById(id){return kanban().find(c=>cardId(c)===id)||null;}
// Pending UI corrections live in localStorage until the user downloads them as
// track-overrides.json (no server). Shape mirrors collector.apply_overrides.
function loadCorr(){try{return JSON.parse(localStorage.getItem('fleetTrackOverrides')||'{}');}catch(e){return {};}}
function saveCorr(o){localStorage.setItem('fleetTrackOverrides',JSON.stringify(o));}
// A HUMAN reassign: set the target AND clear any `_source:'llm-triage'` tag on
// that id, so this becomes a human-owned correction. Critical for "human wins":
// otherwise the next triage run sees the id still marked llm-triage and would
// revert the human's track back to the LLM's proposal.
function humanReassign(o,id,track){o.reassign=o.reassign||{};o.reassign[id]=track;if(o._source&&o._source[id])delete o._source[id];}
// The LLM change-log ("Since last analysis" panel). Keyed by the run's
// generated_at so a dismiss sticks until the NEXT run overwrites the log.
function llmRunlog(){return (DATA&&DATA.llm_runlog)||null;}
function runlogDismissed(){const r=llmRunlog();return !!r&&localStorage.getItem('fleetRunlogDismissed')===(r.generated_at||'');}
function dismissRunlog(){const r=llmRunlog();if(r)localStorage.setItem('fleetRunlogDismissed',r.generated_at||'');}

function worktreeForCard(card){
  const t=(card.title||'').toLowerCase();
  if(!t) return null;
  for(const w of worktrees()){
    const hay=((w.branch||'')+' '+(w.path||'')+' '+(w.card||'')).toLowerCase();
    if(hay.includes(t)) return w;
  }
  return null;
}
// repo a plan belongs to: explicit card.repo, else its matched worktree's repo
function repoForCard(card){
  if(card.repo) return card.repo;
  const w=worktreeForCard(card);
  return w&&w.repo?w.repo:null;
}
function cardAttention(card){
  // A dangling build-spec (stuck in the pipeline) needs attention — must be
  // consistent with the pipeline map's "N stuck" count so the health summary
  // never contradicts it.
  if(isDangling(card)) return {type:'dangling'};
  if(card.status==='blocked') return {type:'blocked'};
  const w=worktreeForCard(card);
  if(w){
    if(w.pr&&w.pr.state==='OPEN') return {type:'pr-review',w};
    if((w.flags||[]).includes('merged-but-not-removed')) return {type:'worktree',w};
  }
  return null;
}
function productActive(pid){return plansFor(pid).filter(c=>c.status==='active').length;}
function productAttention(pid){return plansFor(pid).filter(c=>cardAttention(c)).length;}

function prMeta(pr){
  if(!pr||!pr.state) return {label:'no PR',color:'#a39c8c',dot:'#cabfa9'};
  if(pr.state==='OPEN') return {label:'PR #'+pr.number+' open',color:'#9a6f22',dot:'#cf962f'};
  if(pr.state==='MERGED') return {label:'PR #'+pr.number+' merged',color:'#5d8a6f',dot:'#7faa8c'};
  if(pr.state==='CLOSED') return {label:'PR #'+pr.number+' closed',color:'#a39c8c',dot:'#cabfa9'};
  return {label:'PR',color:'#6e6757',dot:'#b9b0a0'};
}
function attnMeta(type){
  if(type==='pr-review') return {tag:'review',color:'#9a6f22',bg:'#f6ecd6',action:'Review & merge the open PR'};
  if(type==='blocked') return {tag:'blocked',color:'#a85a39',bg:'#f4e3da',action:'Unblock this plan'};
  if(type==='dangling') return {tag:'stuck',color:'#c0392b',bg:'#f6e3e0',action:'Stuck spec — launch or close it'};
  return {tag:'worktree',color:'#7a6a3f',bg:'#efe7d2',action:'Remove the merged worktree'};
}
// path inference (single helper, easy to swap later)
function planPath(card){
  if(card.source==='remote-only') return 'remote';
  const w=worktreeForCard(card);
  if(w&&((w.branch||'').includes('build-spec')||w.pr)) return 'cloud';
  if(w) return 'local';
  return 'unrouted';
}
function pathMeta(path){
  if(path==='cloud') return {tag:'cloud',color:'#9a7b3f',bg:'#f2e9d6'};
  if(path==='local') return {tag:'local',color:'#5f7d68',bg:'#e6efe7'};
  if(path==='openclaw') return {tag:'openclaw',color:'#9a6048',bg:'#f0e1d9'};
  if(path==='remote') return {tag:'remote',color:'#4a6b8a',bg:'#e2ebf2'};
  return {tag:'unrouted',color:'#8c8576',bg:'#efeae0'};
}
// readiness: what the card needs NEXT on the spec->issue->build ladder.
// collector sets card.readiness; fall back here if absent (older status.json).
function readinessOf(card){
  if(card.readiness) return card.readiness;
  if((card.status||'')==='completed'||(card.status||'')==='done') return 'done';
  if((card.github||{}).number) return 'has-issue';
  if(((card.body||'').trim()).length>=200) return 'specd';
  return 'idea';
}
function readinessMeta(r){
  if(r==='has-issue') return {dot:'🟢',label:'ready to build',next:'implement (full-path-github)',color:'#5d8a6f',bg:'#e6efe7'};
  if(r==='specd')     return {dot:'🟡',label:'needs issue',   next:'file the issue (spec-to-issue)',color:'#a9762a',bg:'#f6ecd6'};
  if(r==='done')      return {dot:'✓', label:'done',          next:'shipped — no action',color:'#7d8a7d',bg:'#e9efe9'};
  return                    {dot:'⚪',label:'needs spec',    next:'author a spec first',color:'#8c8576',bg:'#efeae0'};
}
// pipeline stages
const STAGES=[
  {key:'spec',name:"spec'd",color:'#b3a997'},
  {key:'routed',name:'routed',color:'#bd9a5e'},
  {key:'executing',name:'executing',color:'#cf962f'},
  {key:'review',name:'in-review',color:'#c07f33'},
  {key:'shipped',name:'shipped',color:'#7faa8c'},
];
function isRemoteOnly(c){return c.source==='remote-only';}
function isDangling(c){return (c.flags||[]).indexOf('dangling-spec')>=0;}
function planStage(card){
  // Remote-only items (GitHub PR/issue, no local footprint) sit early in the
  // pipeline; a dangling build-spec is "stuck" at spec'd.
  if(isRemoteOnly(card)){
    if(isDangling(card)) return {key:'spec',stuck:(card.age_days!=null?card.age_days+'d':'stuck')};
    return {key:'spec',stuck:null};
  }
  if(card.status==='completed'||card.status==='done') return {key:'shipped',stuck:null};
  // Phase 4a: a merged IMPL PR attached by the collector ships the card, even
  // when the plan card has no local worktree (the common product-plan case).
  if(card.shipped) return {key:'shipped',stuck:null};
  if(card.status==='blocked') return {key:'executing',stuck:'6d'};
  if(card.status==='backlog') return {key:'spec',stuck:null};
  const w=worktreeForCard(card),pr=(w&&w.pr)||{};
  if(pr.state==='MERGED') return {key:'shipped',stuck:null};
  if(pr.state==='OPEN') return {key:'review',stuck:null};
  if(w){ if((w.dirty_files||0)>0) return {key:'executing',stuck:null}; return {key:'routed',stuck:null}; }
  return {key:'spec',stuck:null};
}
// Build a real launch prompt. mode: 'cloud' (claude.ai/code) or 'local'.
// full-path-github REQUIRES a GitHub issue as its input (its predecessor is
// "a GitHub issue exists"). So:
//   - card HAS a github issue/PR  → run full-path-github directly on it.
//   - card has NO issue (plain plan/workbench card) → run spec-to-issue FIRST
//     (plan body → groomed issue), THEN full-path-github on that issue.
// This is the missing-step guard: never point full-path-github at a bare plan doc.
function buildPrompt(card,prod,mode){
  const w=worktreeForCard(card);
  const gh=card.github||{};
  const rd=readinessOf(card);          // idea | specd | has-issue | done
  const repo=repoForCard(card)||'(product-level)';
  const clone = mode==='local'
    ? 'read ~/workspace/skills/full-path-github/ (or: git clone --depth 1 https://github.com/jwrobes/skills.git /tmp/skills)'
    : 'git clone --depth 1 https://github.com/jwrobes/skills.git /tmp/skills';
  const L=[];
  // Step 1 — get the skills (both spec-to-issue and full-path-github live in jwrobes/skills).
  L.push('1. The orchestrator + spec-to-issue are NOT registered skills — expected. Get them:');
  L.push('   '+clone);
  L.push('   You will read SKILL.md files there and FOLLOW them. Do NOT improvise or skip the clone.');
  // TARGET repo = where the work IMPLEMENTS (and where the issue must be filed).
  // For a product-level plan, card.repo is null and the plan declares `repo:`
  // (impl_repo). The plan doc lives in the PLANNING repo and is NOT reachable
  // from a session scoped to the impl repo — so the spec must be copied INLINE
  // into the issue, never linked.
  const implRepo = card.impl_repo || card.repo || gh.repo || '';
  const planUnreachable = !!(card.path && card.impl_repo) || (!card.repo && !!card.impl_repo);
  L.push('');
  // Context block (shared).
  L.push('Initiative: '+card.title);
  L.push('Product: '+(prod?prod.name:card.product)+'   ·   Implements in: '+(implRepo||'(unspecified — ASK which repo)'));
  if(card.goal) L.push('Goal: '+card.goal);
  if(card.path) L.push('Plan doc (PLANNING repo — likely NOT reachable from the impl repo): '+card.path);
  if(gh.url) L.push('GitHub: '+gh.url);
  if(w) L.push('Existing worktree: '+(w.branch||'—')+(w.path?(' @ '+w.path):''));
  if(planUnreachable) L.push('NOTE: the plan doc is in the planning repo (magic-me-workbench). A session scoped to '+(implRepo||'the impl repo')+' CANNOT read it — you must copy the full spec INLINE into the issue, not link it.');
  L.push('');
  const fileInto = implRepo || '(the implementation repo — ASK if unspecified)';
  if(rd==='idea'){
    // No real spec yet → author one (+ build-spec PR for review) BEFORE spec-to-issue.
    L.push('2. This initiative has NO real spec yet (just an idea/thin card). AUTHOR the spec first:');
    L.push('   read /tmp/skills/spec-to-issue/SKILL.md (or ~/workspace/skills/spec-to-issue/) and the orchestrator.');
    L.push('   Draft a real spec from the goal/title above + the ACTUAL '+fileInto+' tree (cite real paths).');
    L.push('   Open it as a `build-spec`-labeled PR IN '+fileInto+' for HUMAN REVIEW — do NOT implement until reviewed.');
    L.push('   STOP after opening the build-spec PR and report. (The human reviews the spec, THEN the next steps run.)');
    L.push('');
    L.push('3. After review: spec-to-issue (spec → groomed `ready` issue IN '+fileInto+', body IS the spec) →');
    L.push('   full-path-github on that issue → ground, branch build-<slug>, implement, comprehension artifact');
    L.push('   at ship (Step 3.5), DRAFT PR "Closes #<issue>", STOP before merge.');
  } else if(rd==='specd'){
    // Real spec, no issue → spec-to-issue then full-path-github.
    L.push('2. This initiative has a spec but NO GitHub issue yet. Run **spec-to-issue** first');
    L.push('   (read /tmp/skills/spec-to-issue/SKILL.md or ~/workspace/skills/spec-to-issue/):');
    L.push('   COPY the full plan/spec INLINE into a single GROOMED GitHub issue IN '+fileInto+' — the issue');
    L.push('   body IS the spec (do not just link the plan doc; the impl session can\'t read it). Label it `ready`.');
    L.push('   That issue is the input to the next step.');
    L.push('');
    L.push('3. Then run **full-path-github** on that new issue: read its SKILL.md + phases/guardrails.md,');
    L.push('   ground the spec, branch off origin/main (build-<slug>), implement, validate, render a');
    L.push('   comprehension artifact at ship (Step 3.5), open a DRAFT PR "Closes #<the new issue>", STOP before merge.');
  } else {  // has-issue (or done — still points at the issue)
    L.push('2. Run **full-path-github** on issue #'+gh.number+' ('+(card.repo||repo)+'):');
    L.push('   read its SKILL.md + phases/guardrails.md and FOLLOW them. Ground the spec against the real');
    L.push('   tree, branch off origin/main (build-<slug>), implement, validate, render a comprehension');
    L.push('   artifact at ship (Step 3.5), open a DRAFT PR "Closes #'+gh.number+'", and STOP before merge.');
  }
  return L.join('\n');
}

function goTo(level,productId,planId,repoId){
  STATE.level=level;STATE.productId=productId??null;STATE.planId=planId??null;STATE.repoId=repoId??null;
  STATE.doneOpen=false;STATE.mapExpanded={};STATE.mapAll=false;STATE.trackOpen={};STATE.strandOpen={};
  // The track detail view carries the track name in the planId slot (a track
  // has no plan). Lift it to STATE.trackName so crumbs + render read it cleanly.
  if(level==='track'){STATE.trackName=planId??null;STATE.planId=null;}
  else STATE.trackName=null;
  // When opening a plan, resolve its real product/repo up front so crumbs +
  // back-link are correct even when navigated from the fleet map (null product).
  if(level==='plan'){
    const c=findCard(STATE.productId,STATE.repoId,STATE.planId);
    if(c){ if(STATE.productId==null&&c.product!=null) STATE.productId=c.product;
           if(STATE.repoId==null){const r=repoForCard(c);if(r)STATE.repoId=r;} }
  }
  window.scrollTo({top:0});render();
}

// ---------- PIPELINE MAP (shared) ----------
// Cards the pipeline map shows: in-flight work PLUS shipped work (so the SHIPPED
// stage reflects reality — a repo that merged 28 PRs must not read SHIPPED 0).
// planStage() routes each to its stage; shipped cards land only in SHIPPED.
function inFlight(plans){return plans.filter(c=>c.status==='active'||c.status==='backlog'||c.status==='blocked'||c.shipped||c.status==='completed'||c.status==='done'||isRemoteOnly(c));}
function mapChip(card,prod){
  const pm=pathMeta(planPath(card)),stg=planStage(card),w=worktreeForCard(card),pr=(w&&w.pr)||{};
  const a=cardAttention(card);
  const accent=isDangling(card)?'#c0392b':(stg.stuck?'#d99a2c':(a?'#cf962f':pm.color));
  const chip=el('<button class="pmchip" data-plan="'+attr(card.title)+'" data-path="'+pm.tag+'" data-stuck="'+(!!stg.stuck)+'" data-remote="'+isRemoteOnly(card)+'" data-dangling="'+isDangling(card)+'" title="'+attr(card.title)+'"></button>');
  let meta='<div style="display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap">'
    +'<span class="mono" style="font-size:8.5px;color:'+pm.color+';background:'+pm.bg+';padding:1px 5px;border-radius:4px">'+pm.tag+'</span>';
  if(pr.number) meta+='<span class="mono" style="font-size:8.5px;color:#9a6f22">PR #'+pr.number+'</span>';
  if(card.github&&card.github.number) meta+='<span class="mono" style="font-size:8.5px;color:#4a6b8a">'+(card.github.kind==='issue'?'issue':'PR')+' #'+card.github.number+'</span>';
  if(isDangling(card)) meta+='<span class="mono" style="display:inline-flex;align-items:center;gap:3px;font-size:8.5px;color:#c0392b;background:#f6e3e0;padding:1px 5px;border-radius:4px">⚠ dangling spec</span>';
  if(stg.stuck) meta+='<span class="mono" style="display:inline-flex;align-items:center;gap:3px;font-size:8.5px;color:#b5701f"><span style="width:5px;height:5px;border-radius:50%;background:#d99a2c;animation:pulseAmber 1.8s ease-in-out infinite"></span>stuck '+stg.stuck+'</span>';
  if(a) meta+='<span style="width:6px;height:6px;border-radius:50%;background:#cf962f;box-shadow:0 0 0 2.5px rgba(207,150,47,.16)"></span>';
  meta+='</div>';
  chip.style.borderLeft='3px solid '+accent;
  chip.innerHTML='<div class="mono" style="font-size:10.5px;color:#33302a;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(card.title)+'</div>'+meta;
  // Navigate with the card's OWN product/repo so it opens correctly even from
  // the fleet-level map (where STATE.productId is null). Fall back to the card's
  // product field, then the scope's product.
  const pid=(prod&&prod.id)||card.product||STATE.productId;
  chip.onclick=()=>goTo('plan',pid,card.title,repoForCard(card));
  return chip;
}
// Pipeline ITEMS: the map shows a TRACK as ONE unit at its track_stage (all
// its strands count once), plus each untracked card at its own planStage. So a
// 6-strand track is a single chip, consistent with the track-aware board.
function pipelineItems(plans){
  const items=[];const seenTrack={};
  plans.forEach(c=>{
    const tn=c.track;
    if(tn){
      const t=trackByName(tn);
      if(t&&(t.members||[]).length>=2){
        if(!seenTrack[tn]){seenTrack[tn]=1;
          items.push({kind:'track',track:t,
            stageKey:((t.facts||{}).pipeline_stage)||'spec'});}
        return;  // strand represented by the track item, not its own chip
      }
    }
    items.push({kind:'card',card:c,stageKey:planStage(c).key});
  });
  return items;
}
// Does a pipeline item need attention / is it stuck? For a track, aggregate
// across its member cards (so the stage's status reflects the whole track).
function itemStuck(it){
  if(it.kind==='card') return !!planStage(it.card).stuck;
  return (it.track.members||[]).some(id=>{const c=cardById(id);return c&&planStage(c).stuck;});
}
function itemAttention(it){
  if(it.kind==='card') return !!cardAttention(it.card);
  return (it.track.members||[]).some(id=>{const c=cardById(id);return c&&cardAttention(c);});
}
function pipelineGroups(plans){
  const items=pipelineItems(plans);
  return STAGES.map(s=>{
    const its=items.filter(it=>it.stageKey===s.key);
    const stuckN=its.filter(itemStuck).length;
    const attnN=its.filter(itemAttention).length;
    let statusLabel,statusColor,statusDot,statusAnim='',hasFlag=true;
    if(stuckN){statusLabel=stuckN+' stuck';statusColor='#b5701f';statusDot='#d99a2c';statusAnim='animation:pulseAmber 1.8s ease-in-out infinite;';}
    else if(attnN){statusLabel=attnN+' needs you';statusColor='#a9762a';statusDot='#cf962f';}
    else if(its.length){statusLabel='on track';statusColor='#6f8a78';statusDot='#9fc0a8';hasFlag=false;}
    else{statusLabel='empty';statusColor='#bcb3a1';statusDot='#dcd3c2';hasFlag=false;}
    const isOpen=STATE.mapAll||!!STATE.mapExpanded[s.key];
    return {key:s.key,name:s.name,color:s.color,count:its.length,items:its,
      statusLabel,statusColor,statusDot,statusAnim,hasFlag,isOpen};
  });
}
// Render a pipeline item — either a normal card chip or a TRACK chip.
function mapItemChip(it,prod){
  return it.kind==='track'?trackMapChip(it.track,prod):mapChip(it.card,prod);
}
// A track as a single pipeline chip: shows track identity + fact summary; opens
// the track detail page (where the strands live), not a lone plan.
function trackMapChip(t,prod){

  meta+='</div>';

  }
  const na=el('<div class="na" data-region="needs-attention" data-count="'+attnPlans.length+'"></div>');
  na.appendChild(el('<div class="na-h"><span style="width:9px;height:9px;border-radius:50%;background:#cf962f;box-shadow:0 0 0 4px rgba(207,150,47,.16)"></span>'
    +'<span class="mono" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#a9762a">Needs attention</span>'
    +'<span class="mono" style="font-size:11px;color:#bca06a">'+attnPlans.length+' item'+(attnPlans.length===1?'':'s')+' need a decision</span></div>'));
  attnPlans.forEach(c=>{
    const a=cardAttention(c),m=attnMeta(a.type);
    const it=el('<button class="na-item" data-attn-item="'+attr(c.title)+'" data-attn-type="'+esc(a.type)+'"></button>');
    it.innerHTML='<span class="tag" style="color:'+m.color+';background:'+m.bg+'">'+m.tag+'</span>'
      +'<span style="flex:1;min-width:0"><span style="display:block" class="mono">'+esc(m.action)+'</span>'
      +'<span style="display:block;font-size:12px;color:#8c8576;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.title)+'</span></span>'
      +'<span style="flex:none;color:#c9a960;font-size:15px">&#8594;</span>';
    it.onclick=()=>onOpen(c);na.appendChild(it);
  });
  return na;
}

// ---------- L1 FLEET ----------
// The "Since last analysis" change-log panel (Pass-1 triage). Shows what the
// last LLM run DID — auto-attaches (already applied, undoable) vs suggestions
// (pending your review) — so LLM state changes are never silent. Dismissible;
// returns null when there's no run, no changes, or it was dismissed.
function runlogPanel(){
  const r=llmRunlog();
  if(!r||!(r.changes||[]).length||runlogDismissed()) return null;
  const auto=(r.changes||[]).filter(c=>c.kind==='auto');
  const sugg=(r.changes||[]).filter(c=>c.kind==='suggest');
  const at=(r.generated_at||'').replace('T',' ').slice(11,16);
  const box=el('<div data-region="llm-runlog" data-auto="'+auto.length+'" data-suggestions="'+sugg.length+'" style="margin:22px 0 4px;border:1px solid #d9c9a0;border-radius:10px;background:linear-gradient(#fffdf6,#fdf6e7);overflow:hidden"></div>');
  const head=el('<div style="display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid #ecdfbf"></div>');
  head.innerHTML='<span class="mono" style="font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#a9762a">LLM triage</span>'
    +'<span style="font-size:14px;color:#5b4a28;font-weight:500">Since last analysis'+(at?' ('+at+')':'')+'</span>'
    +'<span class="mono" style="font-size:11px;color:#8a7f66">'+auto.length+' applied · '+sugg.length+' to review</span>';
  const rev=el('<button data-action="review-suggestions" style="margin-left:auto;font-size:11px;border:1px solid #d2b06a;background:#e7c06a;color:#3b372f;border-radius:6px;padding:5px 11px;cursor:pointer">Review in Work-tracks →</button>');
  rev.onclick=()=>goTo('tracks');
  const dis=el('<button data-action="dismiss-runlog" style="font-size:11px;border:1px solid #ddd4c2;background:transparent;color:#8c8576;border-radius:6px;padding:5px 10px;cursor:pointer">Dismiss</button>');
  dis.onclick=()=>{dismissRunlog();render();};
  head.appendChild(rev);head.appendChild(dis);box.appendChild(head);
  const list=el('<div style="padding:6px 0"></div>');
  (r.changes||[]).forEach(c=>{
    const isAuto=c.kind==='auto';
    // AUTO = done (a check); SUGGEST = pending (a question mark) — visually
    // distinct per the trust rule so you never mistake a proposal for a fact.
    const badge=isAuto
      ?'<span data-change-kind="auto" style="flex:none;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#2f7a52;background:#e3f1e6;border:1px solid #bcdcc4;border-radius:4px;padding:2px 6px">✓ applied</span>'
      :'<span data-change-kind="suggest" style="flex:none;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#a9762a;background:#fbf1dc;border:1px solid #e3cf9f;border-radius:4px;padding:2px 6px">? '+esc(c.action)+'</span>';
    const detail=c.action==='attach'?('→ '+esc(c.track||'?')):(c.action==='create'?('new track '+esc(c.track||'?')):'archive');
    const row=el('<div data-change="'+attr(c.id)+'" style="display:flex;align-items:center;gap:10px;padding:7px 16px"></div>');
    row.innerHTML=badge
      +'<span class="mono" style="font-size:11px;color:#6e6757;flex:none">'+esc(c.id)+'</span>'
      +'<span class="mono" style="font-size:11px;color:#8c6a2a;flex:none">'+detail+'</span>'
      +'<span style="font-size:12px;color:#8a7f66;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.reason||'')+'</span>';
    list.appendChild(row);
  });
  box.appendChild(list);
  return box;
}

// repos within a product: declared repos ∪ repos referenced by plans (via repoForCard)
function reposOf(p){
  const names=(p.repos||[]).map(r=>r.name||(r.slug||'').split('/').pop());
  const plans=plansFor(p.id);
  plans.forEach(c=>{const r=repoForCard(c);if(r&&names.indexOf(r)<0)names.push(r);});
  return names.map(name=>{
    const ps=plans.filter(c=>repoForCard(c)===name);
    const active=ps.filter(c=>c.status==='active').length;
    const attn=ps.filter(c=>cardAttention(c)).length;
    // Match worktree rows to this repo case-insensitively: a clone's repo name
    // comes from its filesystem dir (e.g. `Yogada`) which can differ in case
    // from the config-derived product-repo name (`yogada`). Without this the
    // repo's worktrees/activity don't link and the repo can vanish from the grid.
    const lc=(name||'').toLowerCase();
    const rows=worktrees().filter(w=>(w.repo||'').toLowerCase()===lc);
    const wt=rows.filter(w=>w.kind==='worktree').length;
    // A member repo with local activity (e.g. a dirty/behind clone) but no plans
    // or worktrees would otherwise vanish; count any flagged row so it surfaces.
    const activity=rows.filter(w=>(w.flags||[]).length).length;
    return {name,planCount:ps.length,active,attn,worktrees:wt,activity};
  }).filter(r=>r.planCount>0||r.worktrees>0||r.activity>0);
}

  sec.appendChild(attnPanel(rplans,c=>goTo('plan',STATE.productId,c.title,repoName)));

  // board
  const narrow=window.innerWidth<760;
  const board=el('<div class="board" data-region="board" style="grid-template-columns:'+(narrow?'1fr':'1fr 1fr 1fr')+'"></div>');
  // Track-aware split: a card belonging to a multi-member track is NOT rendered
  // as its own row — instead ONE unified card represents the whole track, placed
  // in the column its furthest-along stage implies. Loose (untracked) cards fall
  // into their status column as before. Guarantees each member appears once.
  const g=boardGroups(rplans);
  board.appendChild(kanbanCol('active',g.active,repoName));
  board.appendChild(kanbanCol('backlog',g.backlog,repoName));
  board.appendChild(kanbanCol('completed',g.completed,repoName));
  sec.appendChild(board);

  // worktrees (local-only)
  const wts=worktrees().filter(w=>w.repo===repoName&&w.kind==='worktree');
  if(wts.length){
    const wbox=el('<div data-region="worktrees" data-visibility="local" style="margin-top:30px;border:1px dashed #ddd4c2;border-radius:8px;padding:14px 16px;background:#faf6ee"></div>');
    wbox.appendChild(el('<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="mono" style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#a8916a">Worktrees</span><span style="font-size:11px;color:#aaa291;font-style:italic">local checkout state</span></div>'));
    const stk=el('<div class="colstack" style="gap:8px"></div>');
    wts.forEach(w=>{
      const wm=wtMeta(w);
      const row=el('<div data-worktree="'+attr(w.branch)+'" style="display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:6px"></div>');
      row.innerHTML='<span class="mono" style="flex:1;min-width:0;font-size:12px;color:#5b5447;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(w.branch)+'</span>'
        +'<span class="mono" style="flex:none;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:'+wm.color+'"><span style="width:6px;height:6px;border-radius:50%;background:'+wm.dot+'"></span>'+wm.label+'</span>';
      stk.appendChild(row);
    });
    wbox.appendChild(stk);sec.appendChild(wbox);
  }
  app.appendChild(sec);
}
function wtMeta(w){
  const f=w.flags||[];
  if(f.includes('merged-but-not-removed')) return {label:'merged · not removed',color:'#a9762a',dot:'#cf962f'};
  if((w.dirty_files||0)>0) return {label:(w.dirty_files)+' uncommitted',color:'#a8916a',dot:'#cbab6a'};
  if(f.includes('stale')) return {label:'stale',color:'#9a917f',dot:'#c2b89f'};
  return {label:'clean',color:'#5d8a6f',dot:'#7faa8c'};
}
// Split this repo's plans into the 3 board columns, collapsing multi-member
// tracks into a single unified card per track. Returns {active,backlog,completed}
// where each is {loose:[card], tracks:[trackObj]}.
function boardGroups(rplans){
  const cols={active:{loose:[],tracks:[]},backlog:{loose:[],tracks:[]},
              completed:{loose:[],tracks:[]}};
  const seenTrack={};  // track name -> already placed (dedupe across members)
  const statusCol=c=>(c.status==='backlog')?'backlog'
    :((c.status==='completed'||c.status==='done'||c.status==='shipped'||c.shipped)?'completed':'active');
  rplans.forEach(c=>{
    const tn=c.track;
    if(tn){
      const t=trackByName(tn);
      // A real (2+ member, fact-stamped) track collapses to a unified card.
      if(t&&(t.members||[]).length>=2){
        if(!seenTrack[tn]){seenTrack[tn]=1;cols[trackColumn(t)].tracks.push(t);}
        return;  // this member is represented by the unified card, not a row
      }
    }
    cols[statusCol(c)].loose.push(c);
  });
  return cols;
}
// One unified card for a whole track: collapsed headline + fact summary, and an
// expandable strand map (grouped by role) showing each member's state + source
// + pipeline stage. This is layer 1 (deterministic facts) of UNIFIED-CARD-MODEL.
const ROLE_ORDER=['spec-PR','impl-PR','issue','worktree','plan','?'];
const ROLE_LABEL={'spec-PR':'SPECS','impl-PR':'IMPL','issue':'ISSUES','worktree':'WORKTREE','plan':'PLAN','?':'OTHER'};
function stateDot(state){
  if(state==='merged') return {c:'#5d8a6f',d:'#7faa8c'};
  if(state==='open') return {c:'#9a6f22',d:'#cf962f'};
  if(state==='dirty') return {c:'#a8916a',d:'#cbab6a'};
  if(state==='closed') return {c:'#a39c8c',d:'#cabfa9'};
  return {c:'#6e6757',d:'#b9b0a0'};
}
function factSummary(t){
  const f=t.facts||{};const parts=[];
  parts.push((f.count||0)+' artifact'+((f.count===1)?'':'s'));
  if(f.merged) parts.push(f.merged+' merged');
  // The useful factual flag (not a verdict): impl merged yet spec-PR still open.
  if(f.impl_merged_spec_open){
    const spec=(t.members_detail||[]).find(d=>d.role==='spec-PR'&&d.state==='open');
    parts.push('spec-PR'+(spec?' '+spec.id.replace(/^.*#/,'#'):'')+' open');
  }
  if((f.sources||[]).length>1) parts.push((f.sources||[]).join('/'));
  return parts.join(' · ');
}
function unifiedCard(t,repoName){
  const open=!!STATE.trackOpen[t.name];
  const wrap=el('<div class="kcard" data-unified-track="'+attr(t.name)+'" style="display:block;padding:0;cursor:default"></div>');
  // Header: the CHEVRON toggles the inline strand preview; the TRACK NAME opens
  // the full track detail view (its own page). Two distinct affordances.
  const head=el('<div style="display:block;box-sizing:border-box;padding:11px 13px"></div>');
  const row=el('<div style="display:flex;align-items:center;gap:7px"></div>');
  const chev=el('<button data-action="toggle-track" title="preview strands" style="all:unset;cursor:pointer;flex:none;font-size:9px;color:#9a917f;transform:rotate('+(open?'90deg':'0deg')+');transition:transform .2s">&#9654;</button>');
  chev.onclick=(e)=>{e.stopPropagation();STATE.trackOpen[t.name]=!STATE.trackOpen[t.name];render();};
  const name=el('<button data-action="open-track" class="t" style="all:unset;cursor:pointer;flex:1;min-width:0;overflow-wrap:anywhere">'+esc(t.name)+'</button>');
  name.onclick=()=>goTo('track',STATE.productId,t.name,repoName);
  row.appendChild(chev);row.appendChild(name);
  row.appendChild(el('<span class="mono" style="flex:none;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#7a6a3f;background:#efe7d2;padding:2px 6px;border-radius:4px">track</span>'));
  head.appendChild(row);
  const facts=el('<button data-action="open-track" data-track-facts class="mono" style="all:unset;cursor:pointer;display:block;font-size:11px;color:#8c8576;margin:6px 0 0 16px;overflow-wrap:anywhere">'+esc(factSummary(t))+' &nbsp;<span style="color:#a8916a">open →</span></button>');
  facts.onclick=()=>goTo('track',STATE.productId,t.name,repoName);
  head.appendChild(facts);
  wrap.appendChild(head);
  if(open) wrap.appendChild(strandMap(t,repoName));
  return wrap;
}
function strandMap(t,repoName){
  const box=el('<div data-region="strand-map" style="border-top:1px solid #ece5d6;padding:8px 13px 11px"></div>');
  const details=(t.members_detail||[]).slice().sort((a,b)=>ROLE_ORDER.indexOf(a.role)-ROLE_ORDER.indexOf(b.role));
  let curRole=null;
  details.forEach(d=>{
    if(d.role!==curRole){
      curRole=d.role;
      box.appendChild(el('<div class="mono" style="font-size:9px;letter-spacing:.12em;color:#a39c8c;margin:9px 0 3px">'+esc(ROLE_LABEL[d.role]||d.role)+'</div>'));
    }
    const sd=stateDot(d.state);
    const num=String(d.id).replace(/^.*#/,'#');
    const row=el('<div data-strand-member="'+attr(d.id)+'" data-strand-role="'+attr(d.role)+'" data-strand-state="'+attr(d.state)+'" data-strand-source="'+attr(d.source||'—')+'" data-strand-stage="'+attr(d.stage)+'" style="display:flex;align-items:center;gap:8px;padding:3px 0;overflow:hidden"></div>');
    row.innerHTML='<span style="flex:none;width:6px;height:6px;border-radius:50%;background:'+sd.d+'"></span>'
      +'<span class="mono" style="flex:none;font-size:11px;color:'+sd.c+'">'+esc(num)+'</span>'
      +'<span class="mono" style="flex:1;min-width:0;font-size:11px;color:#5b5447;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(String(d.title).slice(0,60))+'</span>'
      +'<span class="mono" style="flex:none;font-size:10px;color:'+sd.c+'">'+esc(d.state)+'</span>'
      +(d.source&&d.source!=='—'?'<span class="mono" data-strand-source-tag style="flex:none;font-size:9px;color:#7a6a3f;background:#f2ede2;padding:1px 5px;border-radius:3px">'+esc(d.source)+'</span>':'')
      +'<span class="mono" data-strand-stage-tag style="flex:none;font-size:9px;color:#9a917f">'+esc(d.stage)+'</span>';
    box.appendChild(row);
  });
  return box;
}

        +(a?'<span class="mono" style="font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:'+attnMeta(a.type).color+';background:'+attnMeta(a.type).bg+';padding:3px 6px;border-radius:4px">'+attnMeta(a.type).tag+'</span>':'')+'</span>';

    head.innerHTML='<span style="font-size:10px;color:#9a917f;transform:rotate('+(STATE.doneOpen?'90deg':'0deg')+');transition:transform .2s">&#9654;</span><span class="lbl mono" style="color:#9a917f">Completed</span><span class="n">'+(plans.length+trks.length)+'</span>';
    head.onclick=()=>{STATE.doneOpen=!STATE.doneOpen;render();};
    col.appendChild(head);
    if(STATE.doneOpen){
      const cs=el('<div class="colstack" style="animation:fadeIn .2s ease"></div>');
      trks.forEach(t=>cs.appendChild(unifiedCard(t,repoName)));

        k.innerHTML='<span style="flex:none;width:14px;height:14px;border-radius:50%;background:#e3ebe2;color:#5d8a6f;display:inline-flex;align-items:center;justify-content:center;font-size:8px">&#10003;</span><span class="mono" style="flex:1;min-width:0;font-size:12px;color:#8a8273;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.title)+'</span>';

// ---------- L4 PLAN (feature hub) ----------
function findCard(productId,repoId,planId){
  // Prefer a card scoped to the current product + repo (titles can collide
  // across repos/products). Fall back to ALL cards by title so a plan opened
  // from the fleet-level map (productId may be null) still resolves.
  const all=kanban();
  let pool=all.filter(c=>c.title===planId);
  if(pool.length>1 && productId!=null){
    const scoped=pool.filter(c=>c.product===productId);
    if(scoped.length) pool=scoped;
  }
  if(pool.length>1 && repoId){
    const r=pool.filter(c=>repoForCard(c)===repoId);
    if(r.length) pool=r;
  }
  return pool[0]||null;
}

function renderYouAreHere(card){
  const stg=planStage(card);
  const order=STAGES.map(s=>s.key);
  const ti=order.indexOf(stg.key);
  const fillPct=(82*Math.max(0,ti)/(order.length-1))+'%';
  const box=el('<div class="yah" data-region="you-are-here" data-plan="'+attr(card.title)+'"></div>');
  box.appendChild(el('<div class="mono" style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#a39c8c;margin-bottom:20px">On the pipeline</div>'));
  const rail=el('<div style="position:relative"></div>');
  rail.appendChild(el('<div style="position:absolute;left:9%;right:9%;top:17px;height:3px;border-radius:3px;background:#e7ded0"></div>'));
  rail.appendChild(el('<div style="position:absolute;left:9%;width:'+fillPct+';top:17px;height:3px;border-radius:3px;background:linear-gradient(90deg,#9fc0a8,#7faa8c)"></div>'));
  const stops=el('<div style="position:relative;display:flex"></div>');
  STAGES.forEach((s,i)=>{
    const state=i<ti?'past':i===ti?'current':'future';
    const dot=state==='current'?'19px':'13px';
    const dotBg=state==='past'?'#7faa8c':'#fffdf9';
    const ring=state==='current'?'#cf962f':state==='past'?'#7faa8c':'#d8cfbd';
    const glow=state==='current'?'0 0 0 5px rgba(207,150,47,.16)':'none';
    const label=state==='future'?'#b8af9c':(state==='current'?'#b07d24':'#5d8a6f');
    const stop=el('<div data-stage="'+s.key+'" data-state="'+state+'" style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center"></div>');
    stop.innerHTML='<div style="width:'+dot+';height:'+dot+';border-radius:50%;background:'+dotBg+';border:3px solid '+ring+';box-shadow:'+glow+'"></div>'
      +'<div class="mono" style="margin-top:9px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;color:'+label+'">'+s.name+'</div>'
      +(state==='current'?'<div class="mono" style="margin-top:7px;font-size:9px;color:#b07d24;border:1px solid #e7d3a6;background:#fdf6e7;padding:3px 7px;border-radius:20px;white-space:nowrap">you are here</div>':'');
    stops.appendChild(stop);
  });
  rail.appendChild(stops);box.appendChild(rail);
  return box;
}

      +'<span class="mono" style="font-size:11px;color:'+noteColor+'">'+note+'</span>';

function render(){
  $('stamp').textContent=DATA?('synced '+((DATA.generated_at||'').replace('T',' ').slice(0,16))+'  ·  '+(DATA.mode||'local')):'';
  renderCrumbs();
  const app=$('app');app.innerHTML='';
  if(!DATA){app.appendChild(el('<p class="empty">No data — run <code>python3 collector.py</code>.</p>'));return;}
  if(STATE.level==='fleet') renderFleet(app);
  else if(STATE.level==='tracks') renderTracks(app);
  else if(STATE.level==='product') renderProduct(app);

// ---------- TRACK DETAIL (full page): strands along the pipeline ----------

function findTrack(name){return (tracks()||[]).find(t=>t.name===name)||null;}
function stageMeta(key){return (typeof STAGES!=='undefined'?STAGES:[]).find(s=>s.key===key)||{key,name:key,color:'#b3a997'};}

  // RESERVED slot for the Phase-3 LLM take on THIS strand (per UNIFIED-CARD-MODEL
  // layer 2). Rendered faint until the verdict pass exists.
  box.appendChild(el('<div data-strand-llm-slot style="margin-top:12px;border-top:1px dashed #ece5d6;padding-top:9px;font-size:10.5px;color:#c2b89f;font-style:italic">LLM take on this strand — added by the strand-analysis pass (Phase 3).</div>'));

// ---------- WORK TRACKS (Phase 5): review + fix LLM groupings ----------
function renderTracks(app){
  const corr=loadCorr();
  const sec=el('<section data-view="tracks" style="padding-top:30px"></section>');
  sec.innerHTML='<div class="eyebrow" style="color:#a39c8c;letter-spacing:.16em">fleet · consolidation</div>'
    +'<h1 class="title" style="font-weight:500">Work tracks</h1>'
    +'<p class="lede">Scattered artifacts the LLM grouped into one effort. Wrong grouping? Reassign or split a card — then download your corrections; they win on the next run.</p>';
  // Pending-corrections bar + download. Archive entries (soft-hide) count too —
  // they ride the SAME download-corrections flow as reassign/split.
  const nPend=Object.keys(corr.reassign||{}).length+((corr.split||[]).length)+((corr.archive||[]).length);
  const bar=el('<div data-region="corrections-bar" style="display:flex;align-items:center;gap:12px;margin:14px 0 6px;padding:10px 14px;border-radius:8px;background:'+(nPend?'#fbf3e2':'#f3f0e8')+';border:1px solid '+(nPend?'#e3cf9f':'#e6e0d5')+'"></div>');
  bar.innerHTML='<span class="mono" style="font-size:12px;color:#6e6757" data-pending="'+nPend+'">'+(nPend?nPend+' pending correction'+(nPend===1?'':'s'):'no pending corrections')+'</span>';
  const dl=el('<button data-action="download-corrections" style="margin-left:auto;font-size:12px;border:1px solid #d2b06a;background:#e7c06a;color:#3b372f;border-radius:6px;padding:6px 12px;cursor:pointer">Download corrections</button>');
  dl.onclick=()=>downloadCorrections();
  const clr=el('<button data-action="clear-corrections" style="font-size:12px;border:1px solid #ddd4c2;background:transparent;color:#8c8576;border-radius:6px;padding:6px 12px;cursor:pointer">Clear</button>');
  clr.onclick=()=>{saveCorr({});render();};
  bar.appendChild(dl);if(nPend)bar.appendChild(clr);
  sec.appendChild(bar);
  // Track list.
  tracksMulti().forEach(t=>{
    const box=el('<div data-track="'+attr(t.name)+'" style="margin-top:16px;border:1px solid #e6e0d5;border-radius:10px;overflow:hidden"></div>');
    box.appendChild(el('<div style="display:flex;align-items:baseline;gap:10px;padding:11px 15px;background:#faf6ee;border-bottom:1px solid #ece5d6"><span class="mono" style="font-size:13px;color:#2a2722">'+esc(t.name)+'</span><span class="mono" style="font-size:11px;color:#a39c8c">'+t.members.length+' artifacts'+(t.source==='override'?' · corrected':'')+'</span></div>'));
    t.members.forEach(id=>{
      const c=cardById(id);
      const label=c?(c.title||c.slug||id):id;
      const row=el('<div data-track-member="'+attr(id)+'" style="display:flex;align-items:center;gap:10px;padding:9px 15px;border-top:1px solid #f1ece1"></div>');
      row.innerHTML='<span class="mono" style="font-size:12px;color:#3b372f;flex:1;overflow-wrap:anywhere">'+esc(String(label).slice(0,80))+'</span>'
        +'<span class="mono" style="font-size:10px;color:#b3ab9b">'+esc(id)+'</span>';
      const re=el('<button data-action="reassign" style="font-size:10.5px;border:1px solid #ddd4c2;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;color:#8c6a2a">reassign</button>');
      re.onclick=()=>{const to=prompt('Move "'+label+'" to which track? (name, or blank to pull into its own)',t.name);if(to===null)return;const o=loadCorr();if(to.trim())humanReassign(o,id,to.trim());else{o.split=o.split||[];if(o.split.indexOf(id)<0)o.split.push(id);if(o._source&&o._source[id])delete o._source[id];}saveCorr(o);render();};
      row.appendChild(re);box.appendChild(row);
    });
    sec.appendChild(box);
  });
  // TRIAGE SUGGESTIONS: the medium/low attaches + all create/archive proposals
  // from the last LLM run (auto-attaches already applied — they're in the tracks
  // above). Each is accept/dismiss: accepting stages the SAME kind of correction
  // a human would (reassign / archive), so it rides the download flow.
  const sbox=triageSuggestionsBox();
  if(sbox) sec.appendChild(sbox);
  // UNGROUPED: real in-flight/shipped cards that are in NO track — so a stray
  // like a product-level PR (that deterministic attach didn't catch) can be
  // given a track by hand. Assigning writes the same corrections file.
  const ungrouped=ungroupedCards();
  const ubox=el('<div data-region="ungrouped" style="margin-top:26px;border:1px dashed #ddd4c2;border-radius:10px;overflow:hidden"></div>');
  ubox.appendChild(el('<div style="display:flex;align-items:baseline;gap:10px;padding:11px 15px;background:#f6f2ea;border-bottom:1px solid #ece5d6"><span class="mono" style="font-size:13px;color:#2a2722">Ungrouped</span><span class="mono" style="font-size:11px;color:#a39c8c" data-ungrouped-count="'+ungrouped.length+'">'+ungrouped.length+' card'+(ungrouped.length===1?'':'s')+' in no track</span></div>'));
  if(!ungrouped.length){
    ubox.appendChild(el('<div class="mono" style="font-size:11px;color:#a3b39a;padding:11px 15px">Nothing ungrouped — every live artifact is in a track.</div>'));
  }else{
    ungrouped.forEach(c=>{
      const id=cardId(c),label=c.title||c.slug||id;
      const row=el('<div data-ungrouped-card="'+attr(id)+'" style="display:flex;align-items:center;gap:10px;padding:9px 15px;border-top:1px solid #f1ece1"></div>');
      const stg=planStage(c).key;
      row.innerHTML='<span class="mono" style="font-size:12px;color:#3b372f;flex:1;overflow-wrap:anywhere">'+esc(String(label).slice(0,80))+'</span>'
        +'<span class="mono" style="font-size:9px;letter-spacing:.06em;color:#a8916a">'+esc(stg)+'</span>'
        +'<span class="mono" style="font-size:10px;color:#b3ab9b">'+esc(id)+'</span>';
      const as=el('<button data-action="assign-track" style="font-size:10.5px;border:1px solid #d2b06a;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;color:#8c6a2a">give a track</button>');
      as.onclick=()=>{const to=prompt('Assign "'+label+'" to which track? (existing name, or a new one)','');if(to===null||!to.trim())return;const o=loadCorr();humanReassign(o,id,to.trim());saveCorr(o);render();};
      const ar=el('<button data-action="archive" style="font-size:10.5px;border:1px solid #ddd4c2;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;color:#8c8576">archive</button>');
      ar.onclick=()=>{stageArchive(id);};
      row.appendChild(as);row.appendChild(ar);ubox.appendChild(row);
    });
  }
  sec.appendChild(ubox);
  // ARCHIVED: soft-hidden artifacts (still in the data, dropped from the board).
  // Collapsible so it doesn't clutter. Each has an "unarchive" that stages
  // removal from the archive list -> download -> the collector restores it.
  sec.appendChild(archivedBox());
  app.appendChild(sec);
}

// Stage an archive (soft-hide) into the corrections `archive` list — same
// download-corrections flow as reassign/split. Idempotent.
function stageArchive(id){
  const o=loadCorr();o.archive=o.archive||[];
  if(o.archive.indexOf(id)<0)o.archive.push(id);
  saveCorr(o);render();
}
// Stage an UNARCHIVE: remove the id from the pending archive list. (A card
// archived by a PREVIOUS downloaded run carries c.archived=true from the
// collector; to bring it back you clear it from track-overrides.json — which
// this stages once the download is re-applied.)
function stageUnarchive(id){
  const o=loadCorr();o.archive=(o.archive||[]).filter(x=>x!==id);
  saveCorr(o);render();
}
// Triage suggestions that the human hasn't yet accepted/dismissed. Dismissed
// ids live in localStorage (per suggestion id) so they stay hidden.
function dismissedSuggestions(){try{return JSON.parse(localStorage.getItem('fleetDismissedSuggestions')||'[]');}catch(e){return [];}}
function dismissSuggestion(id){const d=dismissedSuggestions();if(d.indexOf(id)<0)d.push(id);localStorage.setItem('fleetDismissedSuggestions',JSON.stringify(d));render();}
function triageSuggestions(){
  const r=llmRunlog();if(!r)return [];
  const dis=dismissedSuggestions();
  return (r.changes||[]).filter(c=>c.kind==='suggest'&&dis.indexOf(c.id)<0);
}
function triageSuggestionsBox(){
  const sugg=triageSuggestions();
  if(!sugg.length) return null;
  const box=el('<div data-region="triage-suggestions" style="margin-top:26px;border:1px solid #e3cf9f;border-radius:10px;overflow:hidden"></div>');
  box.appendChild(el('<div style="display:flex;align-items:baseline;gap:10px;padding:11px 15px;background:#fbf1dc;border-bottom:1px solid #ecdfbf"><span class="mono" style="font-size:13px;color:#2a2722">Triage suggestions</span><span class="mono" style="font-size:11px;color:#a9762a" data-suggestion-count="'+sugg.length+'">'+sugg.length+' proposal'+(sugg.length===1?'':'s')+' to review</span></div>'));
  sugg.forEach(c=>{
    const cd=cardById(c.id);const label=cd?(cd.title||cd.slug||c.id):c.id;
    const verb=c.action==='attach'?('attach → '+esc(c.track||'?')):(c.action==='create'?('create track '+esc(c.track||'?')):'archive');
    const row=el('<div data-suggestion="'+attr(c.id)+'" data-suggestion-action="'+attr(c.action)+'" style="display:flex;align-items:center;gap:10px;padding:9px 15px;border-top:1px solid #f1ece1"></div>');
    row.innerHTML='<span class="mono" style="flex:none;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#a9762a;background:#fff;border:1px solid #e3cf9f;border-radius:4px;padding:2px 6px">'+esc(c.action)+'</span>'
      +'<span class="mono" style="font-size:12px;color:#3b372f;flex:1;overflow-wrap:anywhere">'+esc(String(label).slice(0,70))+'</span>'
      +'<span class="mono" style="font-size:10.5px;color:#8c6a2a;flex:none">'+verb+'</span>'
      +'<span class="mono" style="font-size:10px;color:#b3ab9b;flex:none">'+esc(c.confidence||'')+'</span>';
    const acc=el('<button data-action="accept-suggestion" style="font-size:10.5px;border:1px solid #d2b06a;background:#e7c06a;color:#3b372f;border-radius:5px;padding:3px 8px;cursor:pointer">accept</button>');
    acc.onclick=()=>{acceptSuggestion(c);};
    const dis=el('<button data-action="dismiss-suggestion" style="font-size:10.5px;border:1px solid #ddd4c2;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;color:#8c8576">dismiss</button>');
    dis.onclick=()=>{dismissSuggestion(c.id);};
    row.appendChild(acc);row.appendChild(dis);box.appendChild(row);
  });
  return box;
}
// Accepting a suggestion stages the SAME correction a human would make by hand
// (so it's reversible + rides the download flow), then dismisses it from the
// queue. attach/create -> reassign to the (new-or-existing) track; archive ->
// the archive list.
function acceptSuggestion(c){
  if(c.action==='archive'){stageArchive(c.id);}
  else if((c.action==='attach'||c.action==='create')&&c.track){
    const o=loadCorr();o.reassign=o.reassign||{};o.reassign[c.id]=c.track;saveCorr(o);
  }
  dismissSuggestion(c.id);   // also re-renders
}
function archivedBox(){
  const arch=archivedCards();
  const staged=(loadCorr().archive||[]);
  // Also show cards the human just STAGED to archive this session (not yet
  // downloaded/applied, so still c.archived=false) so the action has feedback.
  const stagedCards=staged.map(id=>cardById(id)).filter(c=>c&&!c.archived);
  const all=arch.concat(stagedCards);
  const box=el('<div data-region="archived" data-archived-count="'+all.length+'" style="margin-top:26px;border:1px dashed #d7cdb8;border-radius:10px;overflow:hidden"></div>');
  const head=el('<button data-action="toggle-archived" style="width:100%;text-align:left;display:flex;align-items:baseline;gap:10px;padding:11px 15px;background:#f3f0e8;border:none;border-bottom:1px solid #ece5d6;cursor:pointer"></button>');
  const open=STATE.archivedOpen;
  head.innerHTML='<span class="mono" style="font-size:13px;color:#2a2722">Archived</span>'
    +'<span class="mono" style="font-size:11px;color:#a39c8c">'+all.length+' soft-hidden artifact'+(all.length===1?'':'s')+'</span>'
    +'<span class="mono" style="margin-left:auto;font-size:11px;color:#a9762a">'+(open?'hide ▲':'show ▼')+'</span>';
  head.onclick=()=>{STATE.archivedOpen=!STATE.archivedOpen;render();};
  box.appendChild(head);
  if(open){
    if(!all.length){
      box.appendChild(el('<div class="mono" style="font-size:11px;color:#a3b39a;padding:11px 15px">Nothing archived.</div>'));
    }else{
      all.forEach(c=>{
        const id=cardId(c),label=c.title||c.slug||id;
        const isStaged=!c.archived;   // staged this session, not yet applied
        const row=el('<div data-archived-card="'+attr(id)+'" style="display:flex;align-items:center;gap:10px;padding:9px 15px;border-top:1px solid #f1ece1;opacity:.85"></div>');
        row.innerHTML='<span class="mono" style="font-size:12px;color:#6e6757;flex:1;overflow-wrap:anywhere;text-decoration:line-through">'+esc(String(label).slice(0,80))+'</span>'
          +(isStaged?'<span class="mono" style="flex:none;font-size:9px;color:#a9762a">pending</span>':'')
          +'<span class="mono" style="font-size:10px;color:#b3ab9b">'+esc(id)+'</span>';
        const un=el('<button data-action="unarchive" style="font-size:10.5px;border:1px solid #d2b06a;background:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;color:#8c6a2a">unarchive</button>');
        un.onclick=()=>{stageUnarchive(id);};
        row.appendChild(un);box.appendChild(row);
      });
    }
  }
  return box;
}
// Cards that are real strays worth grouping by hand: forge-backed (a PR/issue)
// but in NO track. We deliberately EXCLUDE plain local plan cards (no github) —
// each is its own anchor, not a scattered strand, and listing all ~60 of them
// would bury the actual strays (like the #113 product-level PR). A PR/issue with
// no track is exactly the "belongs to some effort but wasn't grouped" case.
function ungroupedCards(){
  return kanban().filter(c=>!c.track&&!c.archived&&(c.github||{}).number!=null)
    .sort((a,b)=>String(a.title||a.slug||'').localeCompare(String(b.title||b.slug||'')));
}
// Build track-overrides.json from localStorage and trigger a browser download.
function downloadCorrections(){
  const o=loadCorr();
  const blob=new Blob([JSON.stringify(o,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='track-overrides.json';document.body.appendChild(a);a.click();a.remove();
}
let _rt;
window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(render,120);});
// Expose the router + data for headless verification (verify_ui.mjs). Harmless
// in normal use; lets a test drive navigation and assert against the source data.
window.goTo=goTo;window.DATA=DATA;window.STATE=STATE;
window.saveCorr=saveCorr;window.loadCorr=loadCorr;
render();
</script>
