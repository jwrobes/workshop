<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#f7f4ee;color:#23211c;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  @keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  ::-webkit-scrollbar{height:9px;width:9px}

  .wrap{width:100%;max-width:1080px;margin:0 auto;padding:0 20px 80px}
  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:26px 0 22px;border-bottom:1px solid #e6e0d5;flex-wrap:wrap}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px;margin-top:30px}
  .pcard{all:unset;cursor:pointer;position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:172px;background:#fffdf9;border:1px solid #e9e3d7;border-radius:6px;padding:20px;box-shadow:0 1px 2px rgba(60,50,30,.03);transition:transform .15s,box-shadow .15s,border-color .15s}
  .pcard:hover{border-color:#d8cfbd;box-shadow:0 6px 20px rgba(60,50,30,.07);transform:translateY(-2px)}
  .edge{position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:0 3px 3px 0}
  .pname{font-family:'Spectral',serif;font-size:23px;font-weight:500;line-height:1.12;letter-spacing:-.01em}
  .prepo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a39c8c;margin-top:7px}
  .pbig{font-family:'Spectral',serif;font-size:30px;font-weight:500;line-height:1}
  .pfoot{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:18px}
  .clear{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#5d8a6f;font-family:'IBM Plex Mono',monospace}
  .clear .ring{width:15px;height:15px;border-radius:50%;border:1.5px solid #7faa8c;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
  .attn{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#a9762a}

  .ubucket{all:unset;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;min-height:172px;background:transparent;border:1px dashed #d3cab8;border-radius:6px;padding:20px;transition:background .15s,border-color .15s}
  .ubucket:hover{background:#faf6ee;border-color:#c2b89f}
  /* pipeline map */
  .pmwrap{margin-top:26px;animation:viewIn .3s ease}
  .pmhead{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .pmbox{background:#fffdf9;border:1px solid #ece5d8;border-radius:8px;padding:20px 22px 22px}
  .pmtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .pmtoggle{all:unset;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#9a7b3f;border:1px solid #e3d6bd;background:#fbf4e5;padding:5px 11px;border-radius:20px}
  .pmtoggle:hover{color:#7d6230;border-color:#d9c8a6;background:#f6ecd6}
  .pmrail{position:relative}
  .pmline{position:absolute;left:9%;right:9%;top:18px;height:3px;border-radius:3px;background:linear-gradient(90deg,#cdc4b2,#cdb079,#cf962f,#c07f33,#7faa8c)}
  .pmstops{position:relative;display:flex}
  .pmstop{all:unset;cursor:pointer;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding-bottom:6px;border-radius:8px;transition:background .15s}
  .pmstop:hover{background:#f6f1e8}
  .pmdetail{display:flex;margin-top:4px}
  .pmcol{flex:1;display:flex;flex-direction:column;gap:7px;padding:0 5px}
  .pmchip{all:unset;cursor:pointer;display:block;animation:cardIn .2s ease;background:#fffdf9;border:1px solid #ece5d8;border-radius:6px;padding:7px 9px;box-shadow:0 1px 2px rgba(60,50,30,.03);margin-bottom:7px;width:100%;box-sizing:border-box}
  .pmchip:hover{background:#fff;border-color:#d9cfbd;box-shadow:0 4px 12px rgba(60,50,30,.06)}
  .river{background:#fffdf9;border:1px solid #ece5d8;border-radius:8px;padding:18px 16px}
  .na{margin-top:26px;border:1px solid #e7d3a6;background:linear-gradient(#fffdf6,#fdf7e9);border-radius:8px;overflow:hidden}
  .na-h{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #efe0bd}
  .na-item{all:unset;cursor:pointer;display:flex;align-items:center;gap:14px;width:100%;box-sizing:border-box;padding:13px 18px;border-bottom:1px solid #f1e6c9}
  .na-item:hover{background:#fdf6e4}
  .tag{flex:none;width:78px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:4px 7px;border-radius:4px;text-align:center}
  .repogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px}
  .rcard{all:unset;cursor:pointer;position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:128px;background:#fffdf9;border:1px solid #e9e3d7;border-radius:6px;padding:16px 16px 14px;box-shadow:0 1px 2px rgba(60,50,30,.03);transition:transform .15s,box-shadow .15s,border-color .15s}
  .rcard:hover{border-color:#d8cfbd;box-shadow:0 6px 18px rgba(60,50,30,.07);transform:translateY(-2px)}
  .board{margin-top:34px;display:grid;gap:16px;align-items:start}
  .col-h{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
  .col-h .lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .col-h .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b3ab9b}
  .kcard{all:unset;cursor:pointer;position:relative;display:block;background:#fffdf9;border:1px solid #e7e0d2;border-radius:6px;padding:13px 14px;box-shadow:0 1px 2px rgba(60,50,30,.03);transition:box-shadow .12s,border-color .12s}
  .kcard:hover{border-color:#d4cab8;box-shadow:0 5px 16px rgba(60,50,30,.07)}
  .kcard .t{display:block;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#33302a;line-height:1.35;overflow-wrap:anywhere}
  .kmeta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px}
  .prpill{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10.5px}
  .prpill .d{width:6px;height:6px;border-radius:50%}
  .bcard{all:unset;cursor:pointer;display:block;background:#faf6ee;border:1px dashed #ddd4c2;border-radius:6px;padding:12px 13px}
  .bcard:hover{background:#fffdf9;border-color:#c7bca6}
  .ccard{all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:6px;border:1px solid #ece5d8;background:#fbf8f2}
  .ccard:hover{border-color:#dcd3c2;background:#fff}
  .colstack{display:flex;flex-direction:column;gap:10px}
  .planhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .statuspill{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:5px}
  .pathtag{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px}
  .l3grid{display:grid;gap:22px;margin-top:26px;align-items:start}
  .links{border:1px solid #e9e3d7;border-radius:8px;overflow:hidden;background:#fffdf9}
  .lrow{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit;padding:13px 16px;border-bottom:1px solid #f1ece1}
  .lrow:last-child{border-bottom:none}
  .lk{flex:none;width:64px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:#9a917f}
  .lv{flex:1;min-width:0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#3b372f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .localonly{margin-top:14px;border:1px dashed #ddd4c2;border-radius:8px;padding:14px 16px;background:#faf6ee}
  .handoff{border:1px solid #e1d8c6;border-radius:8px;background:linear-gradient(#2c2a24,#262420);color:#efe9dd;overflow:hidden}
  .handoff pre{margin:14px 0 0;padding:14px 17px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.55;color:#d8d1c2;white-space:pre-wrap;word-break:break-word;border-top:1px solid #3a3730;background:#211f1b;max-height:260px;overflow:auto}
  .copybtn{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-sizing:border-box;background:#d7a23f;color:#241f12;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.04em;padding:11px;border-radius:6px;font-weight:500}
  .copybtn:hover{background:#e2b256}
  .artifacts{margin-top:18px;border:1px solid #e9e3d7;border-radius:8px;background:#fffdf9;padding:16px 18px 18px}
  .artcard{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;border:1px solid #ece5d8;border-radius:6px;padding:12px 13px;background:#fbf8f2}
  .artcard:hover{border-color:#d9cfbd;background:#fff}
  .artslot{border:1px dashed #ddd4c2;border-radius:6px;padding:14px 15px;background:#faf6ee;color:#8c8576;font-size:12.5px;line-height:1.5}
  .yah{margin-top:24px;border:1px solid #ece5d8;background:#fffdf9;border-radius:8px;padding:22px 24px 20px}
  .backbtn{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8c8576}
  .backbtn:hover{color:#3b372f}
  .empty{color:#8c8576;padding:60px 0;text-align:center}
  .muted{color:#a39c8c}
  .md{font-size:14.5px;line-height:1.65;color:#3a352d;max-width:70ch}
  .md .md-h{font-family:'Spectral',serif;font-weight:600;line-height:1.25;margin:22px 0 8px;color:#2a2722}
  .md h1.md-h{font-size:24px} .md h2.md-h{font-size:19px} .md h3.md-h{font-size:16px}
  .md h4.md-h,.md h5.md-h,.md h6.md-h{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#6e6757}
  .md .md-p{margin:9px 0}
  .md .md-ul{margin:9px 0;padding-left:22px} .md .md-ul li{margin:4px 0}
  .md code{font-family:'IBM Plex Mono',monospace;font-size:.88em;background:#f0ebe0;padding:.1em .35em;border-radius:4px}
  .md .md-pre{background:#262420;color:#e4ddcf;border-radius:6px;padding:13px 15px;overflow:auto;font-size:12.5px;line-height:1.5}
  .md .md-pre code{background:none;padding:0;color:inherit}
  .md a{color:#9a6f22;text-decoration:underline}
</style>

<body>
<div class="wrap">
  <header class="top">
    <div class="crumbs" id="crumbs"></div>
    <div class="stamp" id="stamp"></div>
  </header>
  <div id="app"></div>
</div>

<script>
const DATA = /*__DATA__*/null;

function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function attr(s){return esc(s).replace(/"/g,'&quot;');}
// tiny, safe markdown -> html (escapes first, then applies a minimal subset)
function mdToHtml(src){
  if(!src) return '';
  let s=src;
  if(s.replace(/^\s+/,'').startsWith('---')){const p=s.split('---');if(p.length>=3){s=p.slice(2).join('---');}}
  s=esc(s);
  const lines=s.split('\n');const out=[];let inCode=false,inList=false;
  const inline=t=>t
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  for(let raw of lines){
    if(raw.trim().startsWith('```')){ if(inList){out.push('</ul>');inList=false;} inCode=!inCode; out.push(inCode?'<pre class="md-pre"><code>':'</code></pre>'); continue; }
    if(inCode){ out.push(raw); continue; }
    const h=raw.match(/^(#{1,6})\s+(.*)$/);
    if(h){ if(inList){out.push('</ul>');inList=false;} const lvl=h[1].length; out.push('<h'+lvl+' class="md-h">'+inline(h[2])+'</h'+lvl+'>'); continue; }
    const li=raw.match(/^\s*[-*]\s+(.*)$/);
    if(li){ if(!inList){out.push('<ul class="md-ul">');inList=true;} out.push('<li>'+inline(li[1])+'</li>'); continue; }
    if(raw.trim()===''){ if(inList){out.push('</ul>');inList=false;} continue; }
    if(inList){out.push('</ul>');inList=false;}
    out.push('<p class="md-p">'+inline(raw)+'</p>');
  }
  if(inList)out.push('</ul>'); if(inCode)out.push('</code></pre>');
  return out.join('\n');
}
function $(id){return document.getElementById(id);}
function slug(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

const STATE={level:'fleet',productId:null,repoId:null,planId:null,doneOpen:false,mapExpanded:{},mapAll:false};

function products(){return (DATA&&DATA.products)||[];}
function kanban(){return (DATA&&DATA.kanban)||[];}
function worktrees(){return (DATA&&DATA.worktrees)||[];}
function unaffiliated(){return (DATA&&DATA.unaffiliated)||[];}
function plansFor(pid){return kanban().filter(c=>c.product===pid);}

function worktreeForCard(card){
  const t=(card.title||'').toLowerCase();
  if(!t) return null;
  for(const w of worktrees()){
    const hay=((w.branch||'')+' '+(w.path||'')+' '+(w.card||'')).toLowerCase();
    if(hay.includes(t)) return w;
  }
  return null;
}
// repo a plan belongs to: explicit card.repo, else its matched worktree's repo
function repoForCard(card){
  if(card.repo) return card.repo;
  const w=worktreeForCard(card);
  return w&&w.repo?w.repo:null;
}
function cardAttention(card){
  // A dangling build-spec (stuck in the pipeline) needs attention — must be
  // consistent with the pipeline map's "N stuck" count so the health summary
  // never contradicts it.
  if(isDangling(card)) return {type:'dangling'};
  if(card.status==='blocked') return {type:'blocked'};
  const w=worktreeForCard(card);
  if(w){
    if(w.pr&&w.pr.state==='OPEN') return {type:'pr-review',w};
    if((w.flags||[]).includes('merged-but-not-removed')) return {type:'worktree',w};
  }
  return null;
}
function productActive(pid){return plansFor(pid).filter(c=>c.status==='active').length;}
function productAttention(pid){return plansFor(pid).filter(c=>cardAttention(c)).length;}

function prMeta(pr){
  if(!pr||!pr.state) return {label:'no PR',color:'#a39c8c',dot:'#cabfa9'};
  if(pr.state==='OPEN') return {label:'PR #'+pr.number+' open',color:'#9a6f22',dot:'#cf962f'};
  if(pr.state==='MERGED') return {label:'PR #'+pr.number+' merged',color:'#5d8a6f',dot:'#7faa8c'};
  if(pr.state==='CLOSED') return {label:'PR #'+pr.number+' closed',color:'#a39c8c',dot:'#cabfa9'};
  return {label:'PR',color:'#6e6757',dot:'#b9b0a0'};
}
function attnMeta(type){
  if(type==='pr-review') return {tag:'review',color:'#9a6f22',bg:'#f6ecd6',action:'Review & merge the open PR'};
  if(type==='blocked') return {tag:'blocked',color:'#a85a39',bg:'#f4e3da',action:'Unblock this plan'};
  if(type==='dangling') return {tag:'stuck',color:'#c0392b',bg:'#f6e3e0',action:'Stuck spec — launch or close it'};
  return {tag:'worktree',color:'#7a6a3f',bg:'#efe7d2',action:'Remove the merged worktree'};
}
// path inference (single helper, easy to swap later)
function planPath(card){
  if(card.source==='remote-only') return 'remote';
  const w=worktreeForCard(card);
  if(w&&((w.branch||'').includes('build-spec')||w.pr)) return 'cloud';
  if(w) return 'local';
  return 'unrouted';
}
function pathMeta(path){
  if(path==='cloud') return {tag:'cloud',color:'#9a7b3f',bg:'#f2e9d6'};
  if(path==='local') return {tag:'local',color:'#5f7d68',bg:'#e6efe7'};
  if(path==='openclaw') return {tag:'openclaw',color:'#9a6048',bg:'#f0e1d9'};
  if(path==='remote') return {tag:'remote',color:'#4a6b8a',bg:'#e2ebf2'};
  return {tag:'unrouted',color:'#8c8576',bg:'#efeae0'};
}
// readiness: what the card needs NEXT on the spec->issue->build ladder.
// collector sets card.readiness; fall back here if absent (older status.json).
function readinessOf(card){
  if(card.readiness) return card.readiness;
  if((card.status||'')==='completed'||(card.status||'')==='done') return 'done';
  if((card.github||{}).number) return 'has-issue';
  if(((card.body||'').trim()).length>=200) return 'specd';
  return 'idea';
}
function readinessMeta(r){
  if(r==='has-issue') return {dot:'🟢',label:'ready to build',next:'implement (full-path-github)',color:'#5d8a6f',bg:'#e6efe7'};
  if(r==='specd')     return {dot:'🟡',label:'needs issue',   next:'file the issue (spec-to-issue)',color:'#a9762a',bg:'#f6ecd6'};
  if(r==='done')      return {dot:'✓', label:'done',          next:'shipped — no action',color:'#7d8a7d',bg:'#e9efe9'};
  return                    {dot:'⚪',label:'needs spec',    next:'author a spec first',color:'#8c8576',bg:'#efeae0'};
}
// pipeline stages
const STAGES=[
  {key:'spec',name:"spec'd",color:'#b3a997'},
  {key:'routed',name:'routed',color:'#bd9a5e'},
  {key:'executing',name:'executing',color:'#cf962f'},
  {key:'review',name:'in-review',color:'#c07f33'},
  {key:'shipped',name:'shipped',color:'#7faa8c'},
];
function isRemoteOnly(c){return c.source==='remote-only';}
function isDangling(c){return (c.flags||[]).indexOf('dangling-spec')>=0;}
function planStage(card){
  // Remote-only items (GitHub PR/issue, no local footprint) sit early in the
  // pipeline; a dangling build-spec is "stuck" at spec'd.
  if(isRemoteOnly(card)){
    if(isDangling(card)) return {key:'spec',stuck:(card.age_days!=null?card.age_days+'d':'stuck')};
    return {key:'spec',stuck:null};
  }
  if(card.status==='completed'||card.status==='done') return {key:'shipped',stuck:null};
  if(card.status==='blocked') return {key:'executing',stuck:'6d'};
  if(card.status==='backlog') return {key:'spec',stuck:null};
  const w=worktreeForCard(card),pr=(w&&w.pr)||{};
  if(pr.state==='MERGED') return {key:'shipped',stuck:null};
  if(pr.state==='OPEN') return {key:'review',stuck:null};
  if(w){ if((w.dirty_files||0)>0) return {key:'executing',stuck:null}; return {key:'routed',stuck:null}; }
  return {key:'spec',stuck:null};
}
// Build a real launch prompt. mode: 'cloud' (claude.ai/code) or 'local'.
// full-path-github REQUIRES a GitHub issue as its input (its predecessor is
// "a GitHub issue exists"). So:
//   - card HAS a github issue/PR  → run full-path-github directly on it.
//   - card has NO issue (plain plan/workbench card) → run spec-to-issue FIRST
//     (plan body → groomed issue), THEN full-path-github on that issue.
// This is the missing-step guard: never point full-path-github at a bare plan doc.
function buildPrompt(card,prod,mode){
  const w=worktreeForCard(card);
  const gh=card.github||{};
  const rd=readinessOf(card);          // idea | specd | has-issue | done
  const repo=repoForCard(card)||'(product-level)';
  const clone = mode==='local'
    ? 'read ~/workspace/skills/full-path-github/ (or: git clone --depth 1 https://github.com/jwrobes/skills.git /tmp/skills)'
    : 'git clone --depth 1 https://github.com/jwrobes/skills.git /tmp/skills';
  const L=[];
  // Step 1 — get the skills (both spec-to-issue and full-path-github live in jwrobes/skills).
  L.push('1. The orchestrator + spec-to-issue are NOT registered skills — expected. Get them:');
  L.push('   '+clone);
  L.push('   You will read SKILL.md files there and FOLLOW them. Do NOT improvise or skip the clone.');
  // TARGET repo = where the work IMPLEMENTS (and where the issue must be filed).
  // For a product-level plan, card.repo is null and the plan declares `repo:`
  // (impl_repo). The plan doc lives in the PLANNING repo and is NOT reachable
  // from a session scoped to the impl repo — so the spec must be copied INLINE
  // into the issue, never linked.
  const implRepo = card.impl_repo || card.repo || gh.repo || '';
  const planUnreachable = !!(card.path && card.impl_repo) || (!card.repo && !!card.impl_repo);
  L.push('');
  // Context block (shared).
  L.push('Initiative: '+card.title);
  L.push('Product: '+(prod?prod.name:card.product)+'   ·   Implements in: '+(implRepo||'(unspecified — ASK which repo)'));
  if(card.goal) L.push('Goal: '+card.goal);
  if(card.path) L.push('Plan doc (PLANNING repo — likely NOT reachable from the impl repo): '+card.path);
  if(gh.url) L.push('GitHub: '+gh.url);
  if(w) L.push('Existing worktree: '+(w.branch||'—')+(w.path?(' @ '+w.path):''));
  if(planUnreachable) L.push('NOTE: the plan doc is in the planning repo (magic-me-workbench). A session scoped to '+(implRepo||'the impl repo')+' CANNOT read it — you must copy the full spec INLINE into the issue, not link it.');
  L.push('');
  const fileInto = implRepo || '(the implementation repo — ASK if unspecified)';
  if(rd==='idea'){
    // No real spec yet → author one (+ build-spec PR for review) BEFORE spec-to-issue.
    L.push('2. This initiative has NO real spec yet (just an idea/thin card). AUTHOR the spec first:');
    L.push('   read /tmp/skills/spec-to-issue/SKILL.md (or ~/workspace/skills/spec-to-issue/) and the orchestrator.');
    L.push('   Draft a real spec from the goal/title above + the ACTUAL '+fileInto+' tree (cite real paths).');
    L.push('   Open it as a `build-spec`-labeled PR IN '+fileInto+' for HUMAN REVIEW — do NOT implement until reviewed.');
    L.push('   STOP after opening the build-spec PR and report. (The human reviews the spec, THEN the next steps run.)');
    L.push('');
    L.push('3. After review: spec-to-issue (spec → groomed `ready` issue IN '+fileInto+', body IS the spec) →');
    L.push('   full-path-github on that issue → ground, branch build-<slug>, implement, comprehension artifact');
    L.push('   at ship (Step 3.5), DRAFT PR "Closes #<issue>", STOP before merge.');
  } else if(rd==='specd'){
    // Real spec, no issue → spec-to-issue then full-path-github.
    L.push('2. This initiative has a spec but NO GitHub issue yet. Run **spec-to-issue** first');
    L.push('   (read /tmp/skills/spec-to-issue/SKILL.md or ~/workspace/skills/spec-to-issue/):');
    L.push('   COPY the full plan/spec INLINE into a single GROOMED GitHub issue IN '+fileInto+' — the issue');
    L.push('   body IS the spec (do not just link the plan doc; the impl session can\'t read it). Label it `ready`.');
    L.push('   That issue is the input to the next step.');
    L.push('');
    L.push('3. Then run **full-path-github** on that new issue: read its SKILL.md + phases/guardrails.md,');
    L.push('   ground the spec, branch off origin/main (build-<slug>), implement, validate, render a');
    L.push('   comprehension artifact at ship (Step 3.5), open a DRAFT PR "Closes #<the new issue>", STOP before merge.');
  } else {  // has-issue (or done — still points at the issue)
    L.push('2. Run **full-path-github** on issue #'+gh.number+' ('+(card.repo||repo)+'):');
    L.push('   read its SKILL.md + phases/guardrails.md and FOLLOW them. Ground the spec against the real');
    L.push('   tree, branch off origin/main (build-<slug>), implement, validate, render a comprehension');
    L.push('   artifact at ship (Step 3.5), open a DRAFT PR "Closes #'+gh.number+'", and STOP before merge.');
  }
  return L.join('\n');
}

function goTo(level,productId,planId,repoId){
  STATE.level=level;STATE.productId=productId??null;STATE.planId=planId??null;STATE.repoId=repoId??null;
  STATE.doneOpen=false;STATE.mapExpanded={};STATE.mapAll=false;
  // When opening a plan, resolve its real product/repo up front so crumbs +
  // back-link are correct even when navigated from the fleet map (null product).
  if(level==='plan'){
    const c=findCard(STATE.productId,STATE.repoId,STATE.planId);
    if(c){ if(STATE.productId==null&&c.product!=null) STATE.productId=c.product;
           if(STATE.repoId==null){const r=repoForCard(c);if(r)STATE.repoId=r;} }
  }
  window.scrollTo({top:0});render();
}

}

// ---------- PIPELINE MAP (shared) ----------
function inFlight(plans){return plans.filter(c=>c.status==='active'||c.status==='backlog'||c.status==='blocked'||isRemoteOnly(c));}
function mapChip(card,prod){
  const pm=pathMeta(planPath(card)),stg=planStage(card),w=worktreeForCard(card),pr=(w&&w.pr)||{};
  const a=cardAttention(card);
  const accent=isDangling(card)?'#c0392b':(stg.stuck?'#d99a2c':(a?'#cf962f':pm.color));
  const chip=el('<button class="pmchip" data-plan="'+attr(card.title)+'" data-path="'+pm.tag+'" data-stuck="'+(!!stg.stuck)+'" data-remote="'+isRemoteOnly(card)+'" data-dangling="'+isDangling(card)+'" title="'+attr(card.title)+'"></button>');
  let meta='<div style="display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap">'
    +'<span class="mono" style="font-size:8.5px;color:'+pm.color+';background:'+pm.bg+';padding:1px 5px;border-radius:4px">'+pm.tag+'</span>';
  if(pr.number) meta+='<span class="mono" style="font-size:8.5px;color:#9a6f22">PR #'+pr.number+'</span>';
  if(card.github&&card.github.number) meta+='<span class="mono" style="font-size:8.5px;color:#4a6b8a">'+(card.github.kind==='issue'?'issue':'PR')+' #'+card.github.number+'</span>';
  if(isDangling(card)) meta+='<span class="mono" style="display:inline-flex;align-items:center;gap:3px;font-size:8.5px;color:#c0392b;background:#f6e3e0;padding:1px 5px;border-radius:4px">⚠ dangling spec</span>';
  if(stg.stuck) meta+='<span class="mono" style="display:inline-flex;align-items:center;gap:3px;font-size:8.5px;color:#b5701f"><span style="width:5px;height:5px;border-radius:50%;background:#d99a2c;animation:pulseAmber 1.8s ease-in-out infinite"></span>stuck '+stg.stuck+'</span>';
  if(a) meta+='<span style="width:6px;height:6px;border-radius:50%;background:#cf962f;box-shadow:0 0 0 2.5px rgba(207,150,47,.16)"></span>';
  meta+='</div>';
  chip.style.borderLeft='3px solid '+accent;
  chip.innerHTML='<div class="mono" style="font-size:10.5px;color:#33302a;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(card.title)+'</div>'+meta;
  // Navigate with the card's OWN product/repo so it opens correctly even from
  // the fleet-level map (where STATE.productId is null). Fall back to the card's
  // product field, then the scope's product.
  const pid=(prod&&prod.id)||card.product||STATE.productId;
  chip.onclick=()=>goTo('plan',pid,card.title,repoForCard(card));
  return chip;
}
function pipelineGroups(plans){
  return STAGES.map(s=>{
    const ps=plans.filter(p=>planStage(p).key===s.key);
    const stuckN=ps.filter(p=>planStage(p).stuck).length;
    const attnN=ps.filter(p=>cardAttention(p)).length;
    let statusLabel,statusColor,statusDot,statusAnim='',hasFlag=true;
    if(stuckN){statusLabel=stuckN+' stuck';statusColor='#b5701f';statusDot='#d99a2c';statusAnim='animation:pulseAmber 1.8s ease-in-out infinite;';}
    else if(attnN){statusLabel=attnN+' needs you';statusColor='#a9762a';statusDot='#cf962f';}
    else if(ps.length){statusLabel='on track';statusColor='#6f8a78';statusDot='#9fc0a8';hasFlag=false;}
    else{statusLabel='empty';statusColor='#bcb3a1';statusDot='#dcd3c2';hasFlag=false;}
    const isOpen=STATE.mapAll||!!STATE.mapExpanded[s.key];
    return {key:s.key,name:s.name,color:s.color,count:ps.length,plans:ps,
      statusLabel,statusColor,statusDot,statusAnim,hasFlag,isOpen};
  });
}
function renderMap(scopeLabel,plans,prod){

      stop.innerHTML='<div style="width:'+dotSize+';height:'+dotSize+';margin-top:'+dotMargin+';border-radius:50%;background:#fffdf9;border:3px solid '+g.color+';box-shadow:'+dotGlow+';transition:all .15s"></div>'
        +'<div class="mono" style="margin-top:9px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;color:'+g.color+'">'+g.name+'</div>'

        +'<div class="mono" style="margin-top:8px;font-size:8.5px;letter-spacing:.06em;color:'+(g.isOpen?'#c2b9a6':'#c9c0ad')+'">'+(g.isOpen?'— click to close':'click to open')+'</div>';
      stop.onclick=()=>{STATE.mapExpanded[g.key]=!STATE.mapExpanded[g.key];STATE.mapAll=false;render();};

    const box=el('<div class="river" data-pipeline-map="river"></div>');

      stage.appendChild(el('<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap"><span class="mono" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:'+g.color+'">'+g.name+'</span><span class="mono" style="font-size:10px;color:#bcb3a1">'+g.count+'</span>'+(g.hasFlag?'<span class="mono" style="font-size:9px;color:'+g.statusColor+'">· '+g.statusLabel+'</span>':'')+'</div>'));

    });
    wrap.appendChild(box);
  }
  return wrap;
}

// repos within a product: declared repos ∪ repos referenced by plans (via repoForCard)
function reposOf(p){
  const names=(p.repos||[]).map(r=>r.name||(r.slug||'').split('/').pop());
  const plans=plansFor(p.id);
  plans.forEach(c=>{const r=repoForCard(c);if(r&&names.indexOf(r)<0)names.push(r);});
  return names.map(name=>{
    const ps=plans.filter(c=>repoForCard(c)===name);
    const active=ps.filter(c=>c.status==='active').length;
    const attn=ps.filter(c=>cardAttention(c)).length;
    // Match worktree rows to this repo case-insensitively: a clone's repo name
    // comes from its filesystem dir (e.g. `Yogada`) which can differ in case
    // from the config-derived product-repo name (`yogada`). Without this the
    // repo's worktrees/activity don't link and the repo can vanish from the grid.
    const lc=(name||'').toLowerCase();
    const rows=worktrees().filter(w=>(w.repo||'').toLowerCase()===lc);
    const wt=rows.filter(w=>w.kind==='worktree').length;
    // A member repo with local activity (e.g. a dirty/behind clone) but no plans
    // or worktrees would otherwise vanish; count any flagged row so it surfaces.
    const activity=rows.filter(w=>(w.flags||[]).length).length;
    return {name,planCount:ps.length,active,attn,worktrees:wt,activity};
  }).filter(r=>r.planCount>0||r.worktrees>0||r.activity>0);
}

function wtMeta(w){
  const f=w.flags||[];
  if(f.includes('merged-but-not-removed')) return {label:'merged · not removed',color:'#a9762a',dot:'#cf962f'};
  if((w.dirty_files||0)>0) return {label:(w.dirty_files)+' uncommitted',color:'#a8916a',dot:'#cbab6a'};
  if(f.includes('stale')) return {label:'stale',color:'#9a917f',dot:'#c2b89f'};
  return {label:'clean',color:'#5d8a6f',dot:'#7faa8c'};
}

// ---------- L4 PLAN (feature hub) ----------
function findCard(productId,repoId,planId){
  // Prefer a card scoped to the current product + repo (titles can collide
  // across repos/products). Fall back to ALL cards by title so a plan opened
  // from the fleet-level map (productId may be null) still resolves.
  const all=kanban();
  let pool=all.filter(c=>c.title===planId);
  if(pool.length>1 && productId!=null){
    const scoped=pool.filter(c=>c.product===productId);
    if(scoped.length) pool=scoped;
  }
  if(pool.length>1 && repoId){
    const r=pool.filter(c=>repoForCard(c)===repoId);
    if(r.length) pool=r;
  }
  return pool[0]||null;
}

  // issue / PR: wire the GitHub ref+url when the card carries one.

    links.appendChild(el('<a href="'+attr(gh.url||'#')+'" target="_blank" rel="noopener" data-field="'+kind+'" class="lrow"><span class="lk">'+kind+'</span><span class="lv">'+esc(lbl)+'</span><span style="flex:none;color:#c2b89f">&#8599;</span></a>'));

      +((w.dirty_files||0)>0?'<div data-field="dirty-files" style="display:flex;gap:10px;align-items:baseline"><span class="mono" style="flex:none;width:64px;font-size:9.5px;text-transform:uppercase;color:#b3a98f">dirty</span><span class="mono" style="font-size:12px;color:#a8916a">'+w.dirty_files+' file'+(w.dirty_files===1?'':'s')+' uncommitted</span></div>':'')
      +((w.flags&&w.flags.length)?'<div data-field="passive-flags" style="display:flex;gap:10px;align-items:baseline"><span class="mono" style="flex:none;width:64px;font-size:9.5px;text-transform:uppercase;color:#b3a98f">flags</span><span style="flex:1;display:flex;flex-wrap:wrap;gap:6px">'+w.flags.map(f=>'<span class="mono" style="font-size:11px;color:#9a917f;background:#f0ebe0;padding:2px 8px;border-radius:4px">'+esc(f)+'</span>').join('')+'</span></div>':'')

  const back=el('<button class="backbtn">&#8592; back to '+esc(repoName)+'</button>');
  back.onclick=()=>{ if(STATE.repoId||repoForCard(card)) goTo('repo',STATE.productId,null,repoName); else goTo('product',STATE.productId); };
  sec.appendChild(back);
  app.appendChild(sec);

  // launch-prompt mode toggle (cloud/local) + copy
  let mode='cloud';
  const pre=$('launch-pre'), cbn=$('copybtn');
  const tabs={cloud:$('ptab-cloud'),local:$('ptab-local')};
  function setMode(m){
    mode=m;
    if(pre) pre.textContent = (m==='local'?promptLocal:promptCloud);
    for(const k in tabs){ if(!tabs[k])continue; const on=(k===m);
      tabs[k].style.color=on?'#241f12':'#bda86f'; tabs[k].style.background=on?'#d7a23f':'#33302a'; }
  }
  if(tabs.cloud) tabs.cloud.onclick=()=>setMode('cloud');
  if(tabs.local) tabs.local.onclick=()=>setMode('local');
  if(cbn) cbn.onclick=()=>{const t=(mode==='local'?promptLocal:promptCloud);try{navigator.clipboard.writeText(t);}catch(e){}cbn.textContent='Copied to clipboard ✓';setTimeout(()=>cbn.textContent='Copy launch prompt',2200);};
}

function renderYouAreHere(card){
  const stg=planStage(card);
  const order=STAGES.map(s=>s.key);
  const ti=order.indexOf(stg.key);
  const fillPct=(82*Math.max(0,ti)/(order.length-1))+'%';
  const box=el('<div class="yah" data-region="you-are-here" data-plan="'+attr(card.title)+'"></div>');
  box.appendChild(el('<div class="mono" style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#a39c8c;margin-bottom:20px">On the pipeline</div>'));
  const rail=el('<div style="position:relative"></div>');
  rail.appendChild(el('<div style="position:absolute;left:9%;right:9%;top:17px;height:3px;border-radius:3px;background:#e7ded0"></div>'));
  rail.appendChild(el('<div style="position:absolute;left:9%;width:'+fillPct+';top:17px;height:3px;border-radius:3px;background:linear-gradient(90deg,#9fc0a8,#7faa8c)"></div>'));
  const stops=el('<div style="position:relative;display:flex"></div>');
  STAGES.forEach((s,i)=>{
    const state=i<ti?'past':i===ti?'current':'future';
    const dot=state==='current'?'19px':'13px';
    const dotBg=state==='past'?'#7faa8c':'#fffdf9';
    const ring=state==='current'?'#cf962f':state==='past'?'#7faa8c':'#d8cfbd';
    const glow=state==='current'?'0 0 0 5px rgba(207,150,47,.16)':'none';
    const label=state==='future'?'#b8af9c':(state==='current'?'#b07d24':'#5d8a6f');
    const stop=el('<div data-stage="'+s.key+'" data-state="'+state+'" style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center"></div>');
    stop.innerHTML='<div style="width:'+dot+';height:'+dot+';border-radius:50%;background:'+dotBg+';border:3px solid '+ring+';box-shadow:'+glow+'"></div>'
      +'<div class="mono" style="margin-top:9px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;color:'+label+'">'+s.name+'</div>'
      +(state==='current'?'<div class="mono" style="margin-top:7px;font-size:9px;color:#b07d24;border:1px solid #e7d3a6;background:#fdf6e7;padding:3px 7px;border-radius:20px;white-space:nowrap">you are here</div>':'');
    stops.appendChild(stop);
  });
  rail.appendChild(stops);box.appendChild(rail);
  return box;
}

function renderArtifacts(card){
  // The docs/<slug>/ home for this feature's workflow HTML outputs.
  const s=slug(card.title);
  const docsBase='docs/'+s+'/';
  const stg=planStage(card).key;
  const produced=(stg==='review'||stg==='shipped'); // outputs exist once work has shipped/in review
  const box=el('<div class="artifacts" data-region="artifacts" data-visibility="public" data-has="'+produced+'"></div>');
  box.appendChild(el('<div style="display:flex;align-items:baseline;gap:9px;margin-bottom:12px"><span class="mono" style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#a39c8c">What I built</span><span style="font-size:11.5px;color:#aaa291">workflow HTML outputs · '+esc(docsBase)+'</span></div>'));
  if(produced){
    const narrow=window.innerWidth<820;
    const g=el('<div style="display:grid;grid-template-columns:'+(narrow?'1fr':'1fr 1fr')+';gap:12px"></div>');
    [{kind:'what-i-built',label:'what-i-built.html',desc:'design + explainer for this feature'},
     {kind:'demo',label:'demo-output.html',desc:'rendered sample output'}].forEach(art=>{
      const a=el('<a href="'+attr(docsBase+art.label)+'" data-artifact="'+art.kind+'" class="artcard"></a>');
      a.innerHTML='<span style="flex:none;width:30px;height:30px;border-radius:6px;background:#efe7d2;color:#9a6f22;display:inline-flex;align-items:center;justify-content:center;font-family:\'IBM Plex Mono\',monospace;font-size:13px">&#9671;</span>'
        +'<span style="flex:1;min-width:0"><span class="mono" style="display:block;font-size:12.5px;color:#33302a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(art.label)+'</span><span style="display:block;font-size:11.5px;color:#8c8576;margin-top:2px">'+esc(art.desc)+'</span></span>'
        +'<span style="flex:none;color:#c2b89f">&#8599;</span>';
      g.appendChild(a);
    });
    box.appendChild(g);
  }else{
    // EXPLICIT placeholder slot — make it clear this is where workflow HTML goes
    box.appendChild(el('<div class="artslot" data-artifact="placeholder">No outputs yet. As this plan ships, its workflow HTML — a <span class="mono" style="color:#9a6f22">what-i-built.html</span> explainer and any demo/output pages — will appear here, rendered from <span class="mono" style="color:#9a6f22">'+esc(docsBase)+'</span> in the repo. Each build step can drop an HTML artifact into that folder to make the result easy to grok.</div>'));
  }
  return box;
}

function renderUnaffiliated(app){
  const sec=el('<section data-view="unaffiliated" style="padding-top:30px"></section>');
  sec.innerHTML='<div class="eyebrow">Unaffiliated</div><h1 class="title" style="font-style:italic;font-weight:400;font-size:clamp(26px,4vw,38px)">Repos without a product</h1><p class="lede">No active plans here. Assign one to a product when it earns a roadmap.</p>';
  const list=el('<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:#e6e0d5;border:1px solid #e6e0d5;border-radius:6px;overflow:hidden;margin-top:22px"></div>');
  unaffiliated().forEach((r,i)=>{
    const name=typeof r==='string'?r:(r.name||(r.slug?r.slug.split('/').pop():String(r)));
    const wts=(r&&r.worktrees)||[];
    const behind=wts.some(w=>(w.flags||[]).includes('behind-origin'));
    const dirty=wts.some(w=>(w.dirty_files||0)>0);
    const note=behind?'behind origin':(dirty?'uncommitted':'clean');
    const noteColor=(behind||dirty)?'#a8916a':'#bcb4a3';
    const row=el('<div data-repo="'+attr(name)+'" style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fffdf9;padding:13px 15px"></div>');
    row.innerHTML='<span class="mono" style="font-size:13px;color:#3b372f"><span style="color:#c2b89f;font-size:11px;margin-right:9px">'+String(i+1).padStart(2,'0')+'</span>'+esc(name)+'</span>'
      +'<span class="mono" style="font-size:11px;color:'+noteColor+'">'+note+'</span>';
    list.appendChild(row);
  });
  sec.appendChild(list);app.appendChild(sec);
}

function render(){
  $('stamp').textContent=DATA?('synced '+((DATA.generated_at||'').replace('T',' ').slice(0,16))+'  ·  '+(DATA.mode||'local')):'';
  renderCrumbs();
  const app=$('app');app.innerHTML='';
  if(!DATA){app.appendChild(el('<p class="empty">No data — run <code>python3 collector.py</code>.</p>'));return;}
  if(STATE.level==='fleet') renderFleet(app);
  else if(STATE.level==='product') renderProduct(app);
  else if(STATE.level==='repo') renderRepo(app);
  else if(STATE.level==='plan') renderPlan(app);
}
let _rt;
window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(render,120);});
// Expose the router + data for headless verification (verify_ui.mjs). Harmless
// in normal use; lets a test drive navigation and assert against the source data.
window.goTo=goTo;window.DATA=DATA;window.STATE=STATE;
render();
</script>
